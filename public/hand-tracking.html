<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Spacial · UP150</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050608;
      --fg: #ededed;
      --muted: rgba(255, 255, 255, 0.62);
      --accent: #b06fe8;
      --accent-warm: #ff9788;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    /* Full-bleed camera feed (background) */
    .video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 0;
      filter: brightness(0.55) saturate(0.85);
    }

    /* Hand tracking overlay */
    .overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
      z-index: 1;
    }

    /* Atmospheric tint over the camera feed */
    .tint {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(120, 60, 220, 0.25), transparent 70%),
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0, 0, 0, 0.45), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.4));
    }

    /* Spacial card carousel */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 3;
      perspective: 1400px;
      perspective-origin: 50% 50%;
      pointer-events: none;
    }
    .track {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }

    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(78vw, 320px);
      height: min(50vh, 420px);
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
      border-radius: 22px;
      padding: 22px;
      background: rgba(20, 18, 28, 0.62);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      display: flex;
      flex-direction: column;
      gap: 10px;
      will-change: transform, opacity;
      transition: box-shadow 0.3s ease;
    }
    .card.focused {
      box-shadow:
        0 40px 100px rgba(176, 111, 232, 0.35),
        0 0 0 1px rgba(176, 111, 232, 0.5) inset,
        0 0 60px rgba(176, 111, 232, 0.15);
    }
    .card .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.3px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }
    .card .title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
      line-height: 1.3;
      max-height: 2.6em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .card .body {
      flex: 1;
      font-size: 13.5px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.78);
      overflow: hidden;
      mask-image: linear-gradient(180deg, #000 80%, transparent);
      -webkit-mask-image: linear-gradient(180deg, #000 80%, transparent);
    }
    .card .badge {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(176, 111, 232, 0.16);
      border: 1px solid rgba(176, 111, 232, 0.3);
      font-size: 10.5px;
      color: #d9bfff;
      letter-spacing: 0.3px;
    }

    /* Empty state card */
    .card.empty {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
      gap: 14px;
    }
    .card.empty h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.4px;
    }
    .card.empty p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 240px;
    }
    .card.empty .glyph {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent-warm), var(--accent));
      display: grid; place-items: center;
      box-shadow: 0 12px 32px rgba(176, 111, 232, 0.4);
    }
    .card.empty .glyph svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* Top HUD */
    .top {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 14px 16px calc(14px + env(safe-area-inset-top, 0px));
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 5;
      pointer-events: none;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      letter-spacing: 0.3px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      pointer-events: auto;
    }
    .pill a { color: inherit; text-decoration: none; }
    .pill.brand {
      color: #fff;
      letter-spacing: 0.16em;
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 11px;
      text-transform: uppercase;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.8);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .dot.idle { background: #fbbf24; box-shadow: 0 0 8px rgba(251, 191, 36, 0.8); }
    .dot.error { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.8); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .top-left, .top-right {
      display: flex; gap: 8px; align-items: center;
    }

    /* Bottom progress / instructions */
    .bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 18px 20px calc(18px + env(safe-area-inset-bottom, 0px));
      z-index: 5;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .progress {
      display: flex;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(14px);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .pip {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transition: background 0.25s ease, transform 0.25s ease;
    }
    .pip.active { background: var(--accent); transform: scale(1.5); }
    .hint {
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.2px;
      text-align: center;
    }

    /* Intro */
    .intro {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(ellipse at center, #15131c 0%, #050608 80%);
      z-index: 30;
      transition: opacity 0.6s ease;
    }
    .intro.hidden { opacity: 0; pointer-events: none; }
    .intro-inner {
      text-align: center;
      max-width: 360px;
      padding: 32px;
    }
    .glyph {
      width: 64px; height: 64px;
      margin: 0 auto 22px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 200, 190, 0.35), transparent 60%),
        linear-gradient(135deg, var(--accent-warm), var(--accent));
      display: grid; place-items: center;
      box-shadow: 0 16px 40px rgba(176, 111, 232, 0.4);
    }
    .glyph svg { width: 32px; height: 32px; stroke: #fff; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .intro h1 {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.6px;
      margin-bottom: 8px;
      background: linear-gradient(180deg, #fff, rgba(255, 255, 255, 0.65));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .intro p {
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.5;
      margin-bottom: 26px;
    }
    .intro button {
      padding: 14px 30px;
      font-size: 15px;
      font-weight: 500;
      background: #fff;
      color: #000;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s ease, opacity 0.15s ease;
    }
    .intro button:hover { opacity: 0.92; }
    .intro button:active { transform: scale(0.97); }
    .intro.loading button { opacity: 0.5; pointer-events: none; }
    .intro .small {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Full-screen edit view */
    .fullscreen {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: linear-gradient(180deg, #0c0a14 0%, #050608 100%);
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .fullscreen.open {
      opacity: 1;
      pointer-events: auto;
    }
    .fs-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: calc(14px + env(safe-area-inset-top, 0px)) 0 calc(14px + env(safe-area-inset-bottom, 0px));
      min-height: 0;
    }
    .fs-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 18px 14px;
    }
    .fs-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--fg);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .fs-back:hover { background: rgba(255, 255, 255, 0.08); }
    .fs-meta-pill {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(176, 111, 232, 0.12);
      border: 1px solid rgba(176, 111, 232, 0.25);
      font-size: 11px;
      letter-spacing: 0.4px;
      color: #d9bfff;
      text-transform: uppercase;
    }
    .fs-spacer { flex: 1; }
    .fs-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 22px 24px;
      min-height: 0;
    }
    .fs-scroll::-webkit-scrollbar { width: 0; }
    .fs-title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.6px;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #fff;
    }
    .fs-body {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .fs-body.editing {
      opacity: 0.45;
      transition: opacity 0.3s;
    }
    .fs-body.changed {
      animation: fadeIn 0.45s ease;
    }
    .fs-body .diff-add {
      background: rgba(116, 224, 144, 0.18);
      border-radius: 3px;
      padding: 0 2px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fs-footer {
      padding: 12px 22px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .fs-transcript {
      min-height: 18px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
      text-align: center;
      max-width: 100%;
      max-height: 4.4em;
      overflow: hidden;
      mask-image: linear-gradient(180deg, #000 60%, transparent);
      -webkit-mask-image: linear-gradient(180deg, #000 60%, transparent);
    }
    .fs-transcript.live::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f87171;
      box-shadow: 0 0 8px rgba(248, 113, 113, 0.8);
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 1.2s infinite;
    }
    .fs-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .fs-mic {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(135deg, var(--accent-warm), var(--accent));
      color: #fff;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(176, 111, 232, 0.4);
      display: grid;
      place-items: center;
      transition: transform 0.15s ease;
    }
    .fs-mic:active { transform: scale(0.96); }
    .fs-mic.recording { background: linear-gradient(135deg, #ff5470, #ff8a5b); }
    .fs-mic.recording .fs-mic-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(255, 84, 112, 0.55);
      animation: ringPulse 1.4s ease-out infinite;
    }
    @keyframes ringPulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .fs-mic.thinking {
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }
    .fs-mic.thinking svg { display: none; }
    .fs-mic.thinking::after {
      content: '';
      width: 22px; height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fs-btn {
      padding: 11px 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    .fs-btn-ghost {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
      color: var(--fg);
    }
    .fs-btn-ghost:hover { background: rgba(255, 255, 255, 0.1); }
    .fs-btn-primary {
      background: #fff;
      color: #000;
    }
    .fs-btn-primary:hover { opacity: 0.92; }
    .fs-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
      letter-spacing: 0.2px;
    }

    /* Make focused card look tappable */
    .card.focused { cursor: pointer; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      background: rgba(220, 40, 40, 0.18);
      border: 1px solid rgba(220, 40, 40, 0.4);
      border-radius: 10px;
      font-size: 13px;
      color: #ffb0b0;
      z-index: 40;
      max-width: 90vw;
      text-align: center;
    }
  </style>
</head>
<body>
  <video class="video-bg" id="video" autoplay playsinline muted></video>
  <canvas class="overlay" id="overlay"></canvas>
  <div class="tint"></div>

  <div class="stage">
    <div class="track" id="track"></div>
  </div>

  <div class="top">
    <div class="top-left">
      <a href="/" class="pill brand" aria-label="Back to UP150">
        <span style="display:inline-flex;align-items:center;gap:6px;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          UP150
        </span>
      </a>
      <div class="pill" id="counter">— / —</div>
    </div>
    <div class="top-right">
      <div class="pill">
        <span class="dot idle" id="dot"></span>
        <span id="status">Ready</span>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="progress" id="progress"></div>
    <div class="hint" id="hint">Move your hand left or right</div>
  </div>

  <div class="intro" id="intro">
    <div class="intro-inner">
      <div class="glyph" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M9 11V5.5a1.5 1.5 0 1 1 3 0V10" />
          <path d="M12 10V4.5a1.5 1.5 0 1 1 3 0V11" />
          <path d="M15 11V6.5a1.5 1.5 0 1 1 3 0V14" />
          <path d="M9 11V8.5a1.5 1.5 0 0 0-3 0V15c0 3.5 2.5 6 6 6s6-2.5 6-6" />
        </svg>
      </div>
      <h1>Spacial</h1>
      <p>Browse your notes by waving your hand. The card you're pointing at floats forward.</p>
      <button id="startBtn">Begin</button>
      <div class="small">Camera stays on your device</div>
    </div>
  </div>

  <div id="toast" class="toast" style="display: none"></div>

  <div class="fullscreen" id="fullscreen" aria-hidden="true">
    <div class="fs-shell">
      <header class="fs-header">
        <button class="fs-back" id="fsBack" aria-label="Back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
          Back
        </button>
        <div class="fs-meta-pill" id="fsMetaPill">—</div>
        <div class="fs-spacer"></div>
      </header>
      <div class="fs-scroll" id="fsScroll">
        <h1 class="fs-title" id="fsTitle">—</h1>
        <div class="fs-body" id="fsBody">—</div>
      </div>
      <div class="fs-footer">
        <div class="fs-transcript" id="fsTranscript"></div>
        <div class="fs-controls">
          <button class="fs-btn fs-btn-ghost" id="fsCancel" hidden>Discard</button>
          <button class="fs-btn fs-btn-primary" id="fsAccept" hidden>Save</button>
          <button class="fs-mic" id="fsMic" aria-label="Talk to edit">
            <span class="fs-mic-ring"></span>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="3" width="6" height="12" rx="3"/>
              <path d="M5 11a7 7 0 0 0 14 0"/>
              <path d="M12 18v3"/>
            </svg>
          </button>
        </div>
        <div class="fs-hint" id="fsHint">Tap and tell the AI what to change</div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      FilesetResolver,
      HandLandmarker,
    } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

    // ---------- Notes ----------
    // The SPA's voice store is persisted to localStorage under
    // 'content-graph-voice' and scripts under 'content-graph-scripts' (zustand
    // persist). We pull from both so this static page can render the user's
    // real content without any backend wiring.
    function readStore(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function loadNotes() {
      const items = [];

      const voice = readStore('content-graph-voice');
      const voiceNotes = voice?.state?.notes;
      if (Array.isArray(voiceNotes)) {
        for (const n of voiceNotes) {
          if (!n || n.status === 'error') continue;
          items.push({
            id: n.id,
            source: 'voice',
            kind: 'Voice',
            title: (n.title || '').trim() || 'Untitled note',
            body: (n.transcript || '').trim() || 'No transcript yet.',
            createdAt: n.createdAt,
            durationMs: n.durationMs,
            generated: !!n.lastGeneration,
          });
        }
      }

      const scripts = readStore('content-graph-scripts');
      const scriptList = scripts?.state?.scripts;
      if (Array.isArray(scriptList)) {
        for (const s of scriptList) {
          if (!s || !s.content) continue;
          items.push({
            id: s.id,
            source: 'script',
            kind: 'Script',
            title: (s.title || '').trim() || 'Untitled script',
            body: s.content.trim(),
            createdAt: s.createdAt,
            generated: false,
          });
        }
      }

      items.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

      // No real content? Seed with a tiny demo so first-time visitors see the
      // spacial mechanic before recording anything.
      if (items.length === 0) {
        const now = new Date().toISOString();
        return [
          { id: 'demo-1', source: 'demo', kind: 'Demo', title: 'Welcome to Spacial', body: 'Wave your hand left and right to flick between notes. Tap the centered card to expand, then speak — the AI rewrites the text when you finish talking.', createdAt: now, generated: false, demo: true },
          { id: 'demo-2', source: 'demo', kind: 'Demo', title: 'Your notes live here', body: 'Record a voice note in UP150 and it shows up in this 3D space, ready to flick through with your hand.', createdAt: now, generated: false, demo: true },
          { id: 'demo-3', source: 'demo', kind: 'Demo', title: 'Why spacial?', body: 'A glance is faster than a tap. Notes laid out in space let you browse without scrolling — like fanning a deck of cards across your desk.', createdAt: now, generated: false, demo: true },
          { id: 'demo-4', source: 'demo', kind: 'Demo', title: 'Built in your browser', body: 'Hand tracking runs locally via MediaPipe. Camera frames never leave your device.', createdAt: now, generated: false, demo: true },
        ];
      }

      return items;
    }

    /**
     * Persist a note edit back to the SPA's localStorage so UP150 picks up the
     * change next time it loads. Demos are in-memory only.
     */
    function saveEditedNote(note, newBody) {
      if (note.source === 'voice') {
        const data = readStore('content-graph-voice');
        if (!data?.state?.notes) return false;
        const target = data.state.notes.find((n) => n.id === note.id);
        if (!target) return false;
        target.transcript = newBody;
        localStorage.setItem('content-graph-voice', JSON.stringify(data));
        return true;
      }
      if (note.source === 'script') {
        const data = readStore('content-graph-scripts');
        if (!data?.state?.scripts) return false;
        const target = data.state.scripts.find((s) => s.id === note.id);
        if (!target) return false;
        target.content = newBody;
        localStorage.setItem('content-graph-scripts', JSON.stringify(data));
        return true;
      }
      return false; // demo
    }

    function readApiKey() {
      const settings = readStore('content-graph-settings');
      return settings?.state?.anthropicKey || '';
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const now = Date.now();
      const diff = now - d.getTime();
      if (diff < 60_000) return 'just now';
      if (diff < 3_600_000) return `${Math.floor(diff / 60_000)}m ago`;
      if (diff < 86_400_000) return `${Math.floor(diff / 3_600_000)}h ago`;
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function fmtDuration(ms) {
      if (!ms) return '';
      const s = Math.round(ms / 1000);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${r.toString().padStart(2, '0')}`;
    }

    function buildCards(notes) {
      const track = document.getElementById('track');
      track.innerHTML = '';

      return notes.map((n, i) => {
        const el = document.createElement('div');
        el.className = 'card';
        const dur = fmtDuration(n.durationMs);
        el.innerHTML = `
          <div class="meta">
            <span>${n.kind} · ${fmtDate(n.createdAt) || `${i + 1} of ${notes.length}`}</span>
            ${dur ? `<span>${dur}</span>` : ''}
          </div>
          <div class="title"></div>
          <div class="body"></div>
          ${n.generated ? '<span class="badge">Generated</span>' : ''}
        `;
        el.querySelector('.title').textContent = n.title;
        el.querySelector('.body').textContent = n.body;
        track.appendChild(el);
        return el;
      });
    }

    // ---------- DOM refs ----------
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const intro = document.getElementById('intro');
    const startBtn = document.getElementById('startBtn');
    const statusEl = document.getElementById('status');
    const dot = document.getElementById('dot');
    const counterEl = document.getElementById('counter');
    const progressEl = document.getElementById('progress');
    const hintEl = document.getElementById('hint');
    const toast = document.getElementById('toast');

    const HAND_CONNECTIONS = [
      [0, 1], [1, 2], [2, 3], [3, 4],
      [0, 5], [5, 6], [6, 7], [7, 8],
      [5, 9], [9, 10], [10, 11], [11, 12],
      [9, 13], [13, 14], [14, 15], [15, 16],
      [13, 17], [17, 18], [18, 19], [19, 20],
      [0, 17],
    ];

    function setStatus(text, mode) {
      statusEl.textContent = text;
      dot.className = 'dot' + (mode === 'idle' ? ' idle' : mode === 'error' ? ' error' : '');
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.style.display = 'block';
    }

    // ---------- Notes state ----------
    const notes = loadNotes();
    const cards = buildCards(notes);
    const N = cards.length;

    const isDemo = notes.length > 0 && notes.every(n => n.demo);
    counterEl.textContent = N === 0 ? '0 notes' : `1 / ${N}`;
    if (isDemo) hintEl.textContent = 'Demo · record a note in UP150 to see your own';
    else hintEl.textContent = 'Flick left or right to browse';

    // Build progress pips
    progressEl.innerHTML = '';
    if (N > 1) {
      const pipCount = Math.min(N, 12);
      for (let i = 0; i < pipCount; i++) {
        const p = document.createElement('div');
        p.className = 'pip';
        progressEl.appendChild(p);
      }
    }
    const pips = Array.from(progressEl.children);

    // Discrete focus — always settles on an integer card index. Smoothed
    // displayFocus animates between integer values during transitions.
    let focusIndex = 0;        // integer: which card is centered
    let displayFocus = 0;      // fractional: animates toward focusIndex

    function setFocus(i) {
      focusIndex = Math.max(0, Math.min(N - 1, i));
    }

    function applyCardTransforms() {
      for (let i = 0; i < cards.length; i++) {
        const offset = i - displayFocus;
        const abs = Math.abs(offset);
        if (abs > 4) {
          cards[i].style.display = 'none';
          continue;
        }
        cards[i].style.display = '';

        const tx = offset * 220;
        const tz = -Math.min(abs, 3) * 90;
        const ty = abs * 6;
        const ry = -offset * 10;
        const opacity = Math.max(0, 1 - abs * 0.22);

        cards[i].style.transform = `translate(-50%, -50%) translate3d(${tx}px, ${ty}px, ${tz}px) rotateY(${ry}deg)`;
        cards[i].style.opacity = String(opacity);
        cards[i].style.zIndex = String(100 - Math.round(abs * 10));
        cards[i].classList.toggle('focused', i === focusIndex);
      }

      if (N > 0) counterEl.textContent = `${focusIndex + 1} / ${N}`;

      if (pips.length) {
        const pipFocus = Math.round((focusIndex / Math.max(1, N - 1)) * (pips.length - 1));
        pips.forEach((p, i) => p.classList.toggle('active', i === pipFocus));
      }
    }

    applyCardTransforms();

    // Touch swipe fallback for mobile (and a sanity check before camera is on).
    {
      let startX = 0, startY = 0, startT = 0;
      window.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        startT = performance.now();
      }, { passive: true });
      window.addEventListener('touchend', (e) => {
        if (!startT) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        const dt = performance.now() - startT;
        startT = 0;
        if (dt > 500) return;
        if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0) setFocus(focusIndex + 1);
        else setFocus(focusIndex - 1);
      }, { passive: true });
    }

    // ---------- MediaPipe ----------
    let handLandmarker = null;

    async function loadModels() {
      const fileset = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      handLandmarker = await HandLandmarker.createFromOptions(fileset, {
        baseOptions: {
          modelAssetPath:
            'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
          delegate: 'GPU',
        },
        runningMode: 'VIDEO',
        numHands: 1,
        minHandDetectionConfidence: 0.5,
        minHandPresenceConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 1280 },
          height: { ideal: 720 },
          facingMode: 'user',
        },
        audio: false,
      });
      video.srcObject = stream;
      await new Promise((resolve) => {
        if (video.readyState >= 1) resolve();
        else video.onloadedmetadata = () => resolve();
      });
      await video.play();

      const w = video.videoWidth;
      const h = video.videoHeight;
      if (w && h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    function drawHand(landmarks, w, h) {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Glow
      ctx.strokeStyle = 'rgba(255, 175, 165, 0.3)';
      ctx.lineWidth = Math.max(4, w * 0.005);
      ctx.beginPath();
      for (const [a, b] of HAND_CONNECTIONS) {
        ctx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
        ctx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
      }
      ctx.stroke();

      // Bones
      ctx.strokeStyle = '#ff9788';
      ctx.lineWidth = Math.max(1.5, w * 0.0022);
      ctx.beginPath();
      for (const [a, b] of HAND_CONNECTIONS) {
        ctx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
        ctx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
      }
      ctx.stroke();

      // Joints
      for (let i = 0; i < landmarks.length; i++) {
        const p = landmarks[i];
        const x = p.x * w;
        const y = p.y * h;
        const isWrist = i === 0;
        const isTip = i === 4 || i === 8 || i === 12 || i === 16 || i === 20;
        const r = isWrist ? Math.max(4, w * 0.005) : isTip ? Math.max(3, w * 0.004) : Math.max(2, w * 0.003);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ff9788';
        ctx.lineWidth = Math.max(1.2, w * 0.0015);
        ctx.stroke();
      }
    }

    // ---------- Loop ----------
    let running = false;
    let lastVideoTime = -1;
    let prevHandX = null;
    let prevHandTime = 0;
    let swipeCooldownMs = 0;
    let lastFrameTime = performance.now();

    function loop() {
      if (!running) return;
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      const now = performance.now();
      const dt = (now - lastFrameTime) / 1000;
      lastFrameTime = now;
      swipeCooldownMs = Math.max(0, swipeCooldownMs - dt * 1000);

      let result = null;
      if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        try {
          result = handLandmarker.detectForVideo(video, now);
        } catch (e) {
          console.error('Inference error:', e);
        }
      }

      if (result && result.landmarks && result.landmarks.length > 0) {
        const lm = result.landmarks[0];
        drawHand(lm, w, h);

        // Hand-X in mirrored display coords (camera frame is mirrored on screen).
        const displayX = 1 - lm[9].x;

        // Velocity-based discrete swipe: a quick horizontal flick with the
        // hand advances one card. Long cooldown so a single flick lands on
        // exactly one card.
        if (prevHandX != null && prevHandTime > 0) {
          const ddt = (now - prevHandTime) / 1000;
          if (ddt > 0 && ddt < 0.2) {
            const vx = (displayX - prevHandX) / ddt;
            if (swipeCooldownMs <= 0 && Math.abs(vx) > 2.4 && N > 1) {
              if (vx < 0) setFocus(focusIndex + 1);
              else setFocus(focusIndex - 1);
              swipeCooldownMs = 1300;
            }
          }
        }
        prevHandX = displayX;
        prevHandTime = now;

        setStatus(N === 0 ? 'Tracking · no notes' : 'Tracking', 'ok');
      } else {
        prevHandX = null;
        setStatus(N === 0 ? 'Looking · no notes' : 'Looking for hand', 'idle');
      }

      // Smooth focus animation. Card transitions take roughly 800ms.
      displayFocus += (focusIndex - displayFocus) * Math.min(1, dt * 3.2);

      applyCardTransforms();
      requestAnimationFrame(loop);
    }

    // ---------- Boot ----------
    startBtn.addEventListener('click', async () => {
      intro.classList.add('loading');
      startBtn.textContent = 'Loading…';
      setStatus('Loading models', 'idle');
      try {
        await Promise.all([loadModels(), startCamera()]);
        intro.classList.add('hidden');
        running = true;
        setStatus(N === 0 ? 'No notes' : 'Looking for hand', 'idle');
        loop();
      } catch (err) {
        console.error(err);
        intro.classList.remove('loading');
        startBtn.textContent = 'Try again';
        const msg =
          err && err.name === 'NotAllowedError'
            ? 'Camera permission denied. Enable camera access and try again.'
            : err && err.name === 'NotFoundError'
            ? 'No camera found on this device.'
            : err && err.message
            ? err.message
            : 'Failed to start. Check your connection and try again.';
        showToast(msg);
      }
    });

    // Keyboard fallback — handy on desktop where a webcam isn't available.
    window.addEventListener('keydown', (e) => {
      if (N === 0) return;
      if (e.key === 'ArrowRight') setFocus(focusIndex + 1);
      else if (e.key === 'ArrowLeft') setFocus(focusIndex - 1);
    });

    // Pause when tab hidden.
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) running = false;
      else if (handLandmarker && video.srcObject) { running = true; loop(); }
    });

    // ---------- Full-screen edit (voice + AI) ----------
    const fs = document.getElementById('fullscreen');
    const fsBack = document.getElementById('fsBack');
    const fsTitle = document.getElementById('fsTitle');
    const fsBody = document.getElementById('fsBody');
    const fsMetaPill = document.getElementById('fsMetaPill');
    const fsMic = document.getElementById('fsMic');
    const fsTranscript = document.getElementById('fsTranscript');
    const fsHint = document.getElementById('fsHint');
    const fsAccept = document.getElementById('fsAccept');
    const fsCancel = document.getElementById('fsCancel');

    let fsNote = null;          // currently open note
    let fsOriginalBody = '';
    let fsProposedBody = null;
    let recognition = null;
    let recordingActive = false;

    function openFullscreen(note) {
      fsNote = note;
      fsOriginalBody = note.body;
      fsProposedBody = null;
      fsTitle.textContent = note.title;
      fsBody.textContent = note.body;
      fsBody.classList.remove('editing', 'changed');
      fsMetaPill.textContent = note.kind;
      fsTranscript.textContent = '';
      fsTranscript.classList.remove('live');
      fsAccept.hidden = true;
      fsCancel.hidden = true;
      fsHint.textContent = note.demo
        ? 'Demo · changes won’t persist. Tap mic and speak.'
        : 'Tap and tell the AI what to change';
      fs.classList.add('open');
      fs.setAttribute('aria-hidden', 'false');
      // Pause spacial loop while in full screen — saves cycles and the camera
      // overlay isn't visible.
      running = false;
    }

    function closeFullscreen() {
      stopRecording();
      fs.classList.remove('open');
      fs.setAttribute('aria-hidden', 'true');
      fsNote = null;
      // Resume spacial loop.
      if (handLandmarker && video.srcObject && !document.hidden) {
        running = true;
        loop();
      }
    }

    fsBack.addEventListener('click', closeFullscreen);

    // Tap on the focused card opens the full-screen view.
    document.getElementById('track').addEventListener('click', (e) => {
      const card = e.target.closest('.card');
      if (!card) return;
      const idx = cards.indexOf(card);
      if (idx === -1) return;
      if (idx !== focusIndex) {
        // Tapping a side card just brings it into focus first.
        setFocus(idx);
        return;
      }
      openFullscreen(notes[idx]);
    });

    // ---------- Voice recognition ----------
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    function startRecording() {
      if (!SR) {
        showFsToast('Voice editing needs a browser with speech recognition (Chrome, Safari).');
        return;
      }
      if (recordingActive) return;

      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = navigator.language || 'en-US';

      let finalTranscript = '';

      recognition.onstart = () => {
        recordingActive = true;
        fsMic.classList.add('recording');
        fsTranscript.classList.add('live');
        fsTranscript.textContent = 'Listening…';
        fsHint.textContent = 'Speak your edit. Pause when done.';
        fsAccept.hidden = true;
        fsCancel.hidden = true;
      };

      recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const r = e.results[i];
          if (r.isFinal) finalTranscript += r[0].transcript;
          else interim += r[0].transcript;
        }
        const display = (finalTranscript + interim).trim();
        fsTranscript.textContent = display || 'Listening…';
      };

      recognition.onerror = (e) => {
        recordingActive = false;
        fsMic.classList.remove('recording');
        fsTranscript.classList.remove('live');
        if (e.error === 'no-speech') {
          fsTranscript.textContent = 'Didn’t catch that. Tap to try again.';
        } else if (e.error === 'not-allowed') {
          fsTranscript.textContent = 'Microphone permission was denied.';
        } else {
          fsTranscript.textContent = 'Voice input error: ' + e.error;
        }
        fsHint.textContent = 'Tap to try again';
      };

      recognition.onend = async () => {
        recordingActive = false;
        fsMic.classList.remove('recording');
        fsTranscript.classList.remove('live');
        const instruction = finalTranscript.trim();
        if (!instruction) {
          fsHint.textContent = 'Didn’t catch anything. Tap to try again.';
          return;
        }
        await runAiEdit(instruction);
      };

      try {
        recognition.start();
      } catch (e) {
        console.error(e);
        fsTranscript.textContent = 'Could not start recording.';
      }
    }

    function stopRecording() {
      if (!recognition) return;
      try { recognition.stop(); } catch {}
      recognition = null;
      recordingActive = false;
      fsMic.classList.remove('recording');
      fsTranscript.classList.remove('live');
    }

    fsMic.addEventListener('click', () => {
      if (recordingActive) stopRecording();
      else startRecording();
    });

    // ---------- Anthropic call ----------
    async function runAiEdit(instruction) {
      if (!fsNote) return;
      const apiKey = readApiKey();
      if (!apiKey) {
        fsTranscript.textContent = 'No API key. Add your Anthropic key in UP150 settings, then come back.';
        fsHint.textContent = 'Settings → API keys → Anthropic';
        return;
      }
      fsMic.classList.add('thinking');
      fsBody.classList.add('editing');
      fsHint.textContent = 'Thinking…';

      try {
        const system = 'You are a careful editor. The user will give you the original text of a personal note and a spoken instruction describing the edit they want. Apply the instruction and return ONLY the edited text — no preamble, no explanations, no markdown fences. Preserve the user’s voice and intent. If the instruction is ambiguous, make the smallest reasonable change.';
        const user = `Original note (between fences):\n\n---\n${fsOriginalBody}\n---\n\nSpoken instruction: ${instruction}\n\nReturn the edited note text only.`;

        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 4096,
            system,
            messages: [{ role: 'user', content: user }],
          }),
        });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`API ${res.status}: ${txt.slice(0, 160)}`);
        }
        const data = await res.json();
        const out = data?.content?.[0]?.text?.trim();
        if (!out) throw new Error('Empty response');

        fsProposedBody = out;
        fsBody.textContent = out;
        fsBody.classList.remove('editing');
        fsBody.classList.add('changed');
        fsAccept.hidden = false;
        fsCancel.hidden = false;
        fsHint.textContent = fsNote.demo
          ? 'Demo edit — saves only in this view'
          : 'Tap save to write back to UP150';
      } catch (err) {
        console.error(err);
        fsBody.classList.remove('editing');
        fsTranscript.textContent = 'Edit failed: ' + (err.message || 'unknown error');
        fsHint.textContent = 'Tap mic to try again';
      } finally {
        fsMic.classList.remove('thinking');
      }
    }

    fsAccept.addEventListener('click', () => {
      if (!fsProposedBody || !fsNote) return;
      fsNote.body = fsProposedBody;
      fsOriginalBody = fsProposedBody;
      const saved = saveEditedNote(fsNote, fsProposedBody);
      fsProposedBody = null;
      fsAccept.hidden = true;
      fsCancel.hidden = true;
      fsTranscript.textContent = saved ? 'Saved to UP150' : (fsNote.demo ? 'Saved in this session' : 'Could not write back');
      fsHint.textContent = 'Tap mic for another edit';
      // Update the underlying card preview too.
      const idx = notes.indexOf(fsNote);
      if (idx !== -1) {
        const bodyEl = cards[idx].querySelector('.body');
        if (bodyEl) bodyEl.textContent = fsProposedBody || fsNote.body;
      }
    });

    fsCancel.addEventListener('click', () => {
      if (!fsNote) return;
      fsBody.textContent = fsOriginalBody;
      fsBody.classList.remove('changed');
      fsProposedBody = null;
      fsAccept.hidden = true;
      fsCancel.hidden = true;
      fsTranscript.textContent = '';
      fsHint.textContent = 'Tap mic to try a different edit';
    });

    // Local-to-fullscreen toast (reuses the global toast styling).
    function showFsToast(msg) {
      toast.textContent = msg;
      toast.style.display = 'block';
      toast.style.zIndex = '60';
      setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    // Escape key closes fullscreen on desktop.
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && fs.classList.contains('open')) closeFullscreen();
    });
  </script>
</body>
</html>
