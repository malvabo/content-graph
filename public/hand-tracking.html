<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Spacial · UP150</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050608;
      --fg: #ededed;
      --muted: rgba(255, 255, 255, 0.62);
      --accent: #b06fe8;
      --accent-warm: #ff9788;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    /* Full-bleed camera feed (background) */
    .video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 0;
      filter: brightness(0.55) saturate(0.85);
    }

    /* Hand tracking overlay */
    .overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
      z-index: 1;
    }

    /* Atmospheric tint over the camera feed */
    .tint {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(120, 60, 220, 0.25), transparent 70%),
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0, 0, 0, 0.45), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.4));
    }

    /* Spacial card carousel */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 3;
      perspective: 1400px;
      perspective-origin: 50% 50%;
      pointer-events: none;
    }
    .track {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }

    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(78vw, 320px);
      height: min(50vh, 420px);
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
      border-radius: 22px;
      padding: 22px;
      background: rgba(20, 18, 28, 0.62);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      display: flex;
      flex-direction: column;
      gap: 10px;
      will-change: transform, opacity;
      transition: box-shadow 0.3s ease;
    }
    .card.focused {
      box-shadow:
        0 40px 100px rgba(176, 111, 232, 0.35),
        0 0 0 1px rgba(176, 111, 232, 0.5) inset,
        0 0 60px rgba(176, 111, 232, 0.15);
    }
    .card .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.3px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }
    .card .title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
      line-height: 1.3;
      max-height: 2.6em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .card .body {
      flex: 1;
      font-size: 13.5px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.78);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 12;
      -webkit-box-orient: vertical;
      mask-image: linear-gradient(180deg, #000 80%, transparent);
      -webkit-mask-image: linear-gradient(180deg, #000 80%, transparent);
    }
    .card .badge {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(176, 111, 232, 0.16);
      border: 1px solid rgba(176, 111, 232, 0.3);
      font-size: 10.5px;
      color: #d9bfff;
      letter-spacing: 0.3px;
    }

    /* Empty state card */
    .card.empty {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
      gap: 14px;
    }
    .card.empty h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.4px;
    }
    .card.empty p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 240px;
    }
    .card.empty .glyph {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent-warm), var(--accent));
      display: grid; place-items: center;
      box-shadow: 0 12px 32px rgba(176, 111, 232, 0.4);
    }
    .card.empty .glyph svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* Top HUD */
    .top {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 14px 16px calc(14px + env(safe-area-inset-top, 0px));
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 5;
      pointer-events: none;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      letter-spacing: 0.3px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      pointer-events: auto;
    }
    .pill a { color: inherit; text-decoration: none; }
    .pill.brand {
      color: #fff;
      letter-spacing: 0.16em;
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 11px;
      text-transform: uppercase;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.8);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .dot.idle { background: #fbbf24; box-shadow: 0 0 8px rgba(251, 191, 36, 0.8); }
    .dot.error { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.8); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .top-left, .top-right {
      display: flex; gap: 8px; align-items: center;
    }

    /* Bottom progress / instructions */
    .bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 18px 20px calc(18px + env(safe-area-inset-bottom, 0px));
      z-index: 5;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .progress {
      display: flex;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(14px);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .pip {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transition: background 0.25s ease, transform 0.25s ease;
    }
    .pip.active { background: var(--accent); transform: scale(1.5); }
    .hint {
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.2px;
      text-align: center;
    }

    /* Intro */
    .intro {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(ellipse at center, #15131c 0%, #050608 80%);
      z-index: 30;
      transition: opacity 0.6s ease;
    }
    .intro.hidden { opacity: 0; pointer-events: none; }
    .intro-inner {
      text-align: center;
      max-width: 360px;
      padding: 32px;
    }
    .glyph {
      width: 64px; height: 64px;
      margin: 0 auto 22px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 200, 190, 0.35), transparent 60%),
        linear-gradient(135deg, var(--accent-warm), var(--accent));
      display: grid; place-items: center;
      box-shadow: 0 16px 40px rgba(176, 111, 232, 0.4);
    }
    .glyph svg { width: 32px; height: 32px; stroke: #fff; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .intro h1 {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.6px;
      margin-bottom: 8px;
      background: linear-gradient(180deg, #fff, rgba(255, 255, 255, 0.65));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .intro p {
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.5;
      margin-bottom: 26px;
    }
    .intro button {
      padding: 14px 30px;
      font-size: 15px;
      font-weight: 500;
      background: #fff;
      color: #000;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s ease, opacity 0.15s ease;
    }
    .intro button:hover { opacity: 0.92; }
    .intro button:active { transform: scale(0.97); }
    .intro.loading button { opacity: 0.5; pointer-events: none; }
    .intro .small {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      background: rgba(220, 40, 40, 0.18);
      border: 1px solid rgba(220, 40, 40, 0.4);
      border-radius: 10px;
      font-size: 13px;
      color: #ffb0b0;
      z-index: 40;
      max-width: 90vw;
      text-align: center;
    }
  </style>
</head>
<body>
  <video class="video-bg" id="video" autoplay playsinline muted></video>
  <canvas class="overlay" id="overlay"></canvas>
  <div class="tint"></div>

  <div class="stage">
    <div class="track" id="track"></div>
  </div>

  <div class="top">
    <div class="top-left">
      <a href="/" class="pill brand" aria-label="Back to UP150">
        <span style="display:inline-flex;align-items:center;gap:6px;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          UP150
        </span>
      </a>
      <div class="pill" id="counter">— / —</div>
    </div>
    <div class="top-right">
      <div class="pill">
        <span class="dot idle" id="dot"></span>
        <span id="status">Ready</span>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="progress" id="progress"></div>
    <div class="hint" id="hint">Move your hand left or right</div>
  </div>

  <div class="intro" id="intro">
    <div class="intro-inner">
      <div class="glyph" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M9 11V5.5a1.5 1.5 0 1 1 3 0V10" />
          <path d="M12 10V4.5a1.5 1.5 0 1 1 3 0V11" />
          <path d="M15 11V6.5a1.5 1.5 0 1 1 3 0V14" />
          <path d="M9 11V8.5a1.5 1.5 0 0 0-3 0V15c0 3.5 2.5 6 6 6s6-2.5 6-6" />
        </svg>
      </div>
      <h1>Spacial</h1>
      <p>Browse your notes by waving your hand. The card you're pointing at floats forward.</p>
      <button id="startBtn">Begin</button>
      <div class="small">Camera stays on your device</div>
    </div>
  </div>

  <div id="toast" class="toast" style="display: none"></div>

  <script type="module">
    import {
      FilesetResolver,
      HandLandmarker,
    } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

    // ---------- Notes ----------
    // The SPA's voice store is persisted to localStorage under
    // 'content-graph-voice' (zustand persist). We read from it so this static
    // page can render the user's actual notes without any backend wiring.
    function loadNotes() {
      try {
        const raw = localStorage.getItem('content-graph-voice');
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        const notes = parsed?.state?.notes;
        if (!Array.isArray(notes)) return [];
        return notes
          .filter((n) => n && n.status !== 'error')
          .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      } catch (e) {
        console.warn('Failed to load notes:', e);
        return [];
      }
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const now = Date.now();
      const diff = now - d.getTime();
      if (diff < 60_000) return 'just now';
      if (diff < 3_600_000) return `${Math.floor(diff / 60_000)}m ago`;
      if (diff < 86_400_000) return `${Math.floor(diff / 3_600_000)}h ago`;
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function fmtDuration(ms) {
      if (!ms) return '';
      const s = Math.round(ms / 1000);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${r.toString().padStart(2, '0')}`;
    }

    function buildCards(notes) {
      const track = document.getElementById('track');
      track.innerHTML = '';

      if (notes.length === 0) {
        const el = document.createElement('div');
        el.className = 'card empty focused';
        el.innerHTML = `
          <div class="glyph"><svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h12"/></svg></div>
          <h2>No notes yet</h2>
          <p>Record a voice note in UP150 and it'll appear here, floating in space.</p>
        `;
        track.appendChild(el);
        return [el];
      }

      return notes.map((n, i) => {
        const el = document.createElement('div');
        el.className = 'card';
        const title = (n.title || '').trim() || 'Untitled note';
        const body = (n.transcript || '').trim() || 'No transcript available.';
        const dur = fmtDuration(n.durationMs);
        el.innerHTML = `
          <div class="meta">
            <span>${i + 1} · ${fmtDate(n.createdAt)}</span>
            ${dur ? `<span>${dur}</span>` : ''}
          </div>
          <div class="title"></div>
          <div class="body"></div>
          ${n.lastGeneration ? '<span class="badge">Generated</span>' : ''}
        `;
        el.querySelector('.title').textContent = title;
        el.querySelector('.body').textContent = body;
        track.appendChild(el);
        return el;
      });
    }

    // ---------- DOM refs ----------
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const intro = document.getElementById('intro');
    const startBtn = document.getElementById('startBtn');
    const statusEl = document.getElementById('status');
    const dot = document.getElementById('dot');
    const counterEl = document.getElementById('counter');
    const progressEl = document.getElementById('progress');
    const hintEl = document.getElementById('hint');
    const toast = document.getElementById('toast');

    const HAND_CONNECTIONS = [
      [0, 1], [1, 2], [2, 3], [3, 4],
      [0, 5], [5, 6], [6, 7], [7, 8],
      [5, 9], [9, 10], [10, 11], [11, 12],
      [9, 13], [13, 14], [14, 15], [15, 16],
      [13, 17], [17, 18], [18, 19], [19, 20],
      [0, 17],
    ];

    function setStatus(text, mode) {
      statusEl.textContent = text;
      dot.className = 'dot' + (mode === 'idle' ? ' idle' : mode === 'error' ? ' error' : '');
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.style.display = 'block';
    }

    // ---------- Notes state ----------
    const notes = loadNotes();
    const cards = buildCards(notes);
    const N = cards.length;

    counterEl.textContent = N === 0 ? '0 notes' : `1 / ${N}`;
    if (N === 0) hintEl.textContent = 'Record a note in UP150 to fill this space';

    // Build progress pips
    progressEl.innerHTML = '';
    if (N > 1) {
      const pipCount = Math.min(N, 12);
      for (let i = 0; i < pipCount; i++) {
        const p = document.createElement('div');
        p.className = 'pip';
        progressEl.appendChild(p);
      }
    }
    const pips = Array.from(progressEl.children);

    // Continuous focused index — fractional, smoothed.
    let focus = 0;
    let targetFocus = 0;

    function applyCardTransforms() {
      const fi = Math.round(focus);
      for (let i = 0; i < cards.length; i++) {
        const offset = i - focus;
        const abs = Math.abs(offset);
        if (abs > 4) {
          cards[i].style.display = 'none';
          continue;
        }
        cards[i].style.display = '';

        // Spacial layout: cards arc back from the focus point.
        const tx = offset * 220;
        const tz = -Math.min(abs, 3) * 90;
        const ty = abs * 6;
        const ry = -offset * 10;
        const opacity = Math.max(0, 1 - abs * 0.22);

        cards[i].style.transform = `translate(-50%, -50%) translate3d(${tx}px, ${ty}px, ${tz}px) rotateY(${ry}deg)`;
        cards[i].style.opacity = String(opacity);
        cards[i].style.zIndex = String(100 - Math.round(abs * 10));
        cards[i].classList.toggle('focused', i === fi);
      }

      if (N > 0) counterEl.textContent = `${Math.min(N, fi + 1)} / ${N}`;

      if (pips.length) {
        const pipFocus = Math.round((fi / Math.max(1, N - 1)) * (pips.length - 1));
        pips.forEach((p, i) => p.classList.toggle('active', i === pipFocus));
      }
    }

    applyCardTransforms();

    // ---------- MediaPipe ----------
    let handLandmarker = null;

    async function loadModels() {
      const fileset = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      handLandmarker = await HandLandmarker.createFromOptions(fileset, {
        baseOptions: {
          modelAssetPath:
            'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
          delegate: 'GPU',
        },
        runningMode: 'VIDEO',
        numHands: 1,
        minHandDetectionConfidence: 0.5,
        minHandPresenceConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 1280 },
          height: { ideal: 720 },
          facingMode: 'user',
        },
        audio: false,
      });
      video.srcObject = stream;
      await new Promise((resolve) => {
        if (video.readyState >= 1) resolve();
        else video.onloadedmetadata = () => resolve();
      });
      await video.play();

      const w = video.videoWidth;
      const h = video.videoHeight;
      if (w && h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    function drawHand(landmarks, w, h) {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Glow
      ctx.strokeStyle = 'rgba(255, 175, 165, 0.3)';
      ctx.lineWidth = Math.max(4, w * 0.005);
      ctx.beginPath();
      for (const [a, b] of HAND_CONNECTIONS) {
        ctx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
        ctx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
      }
      ctx.stroke();

      // Bones
      ctx.strokeStyle = '#ff9788';
      ctx.lineWidth = Math.max(1.5, w * 0.0022);
      ctx.beginPath();
      for (const [a, b] of HAND_CONNECTIONS) {
        ctx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
        ctx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
      }
      ctx.stroke();

      // Joints
      for (let i = 0; i < landmarks.length; i++) {
        const p = landmarks[i];
        const x = p.x * w;
        const y = p.y * h;
        const isWrist = i === 0;
        const isTip = i === 4 || i === 8 || i === 12 || i === 16 || i === 20;
        const r = isWrist ? Math.max(4, w * 0.005) : isTip ? Math.max(3, w * 0.004) : Math.max(2, w * 0.003);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ff9788';
        ctx.lineWidth = Math.max(1.2, w * 0.0015);
        ctx.stroke();
      }
    }

    // ---------- Loop ----------
    let running = false;
    let lastVideoTime = -1;
    let smoothedHandX = null;

    function loop() {
      if (!running) return;
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      let result = null;
      if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        try {
          result = handLandmarker.detectForVideo(video, performance.now());
        } catch (e) {
          console.error('Inference error:', e);
        }
      }

      if (result && result.landmarks && result.landmarks.length > 0) {
        const lm = result.landmarks[0];
        drawHand(lm, w, h);

        // Use the palm centroid (landmark 9 = middle finger MCP) as the pointer.
        const handX = lm[9].x; // 0..1 in video coords
        // Map to mirrored display coords (we render the camera mirrored, so the
        // user's right hand in the world appears on the right side of the screen).
        const displayX = 1 - handX;

        if (smoothedHandX == null) smoothedHandX = displayX;
        else smoothedHandX += (displayX - smoothedHandX) * 0.25;

        if (N > 0) {
          // Map hand X to a focused card index. Apply a deadzone in the center
          // so subtle motion doesn't drift, and a softer curve at edges.
          const centered = (smoothedHandX - 0.5) * 2; // -1..1
          const dz = 0.08;
          let s = 0;
          if (centered > dz) s = (centered - dz) / (1 - dz);
          else if (centered < -dz) s = (centered + dz) / (1 - dz);
          // Eased response feels more spacial than linear.
          const eased = Math.sign(s) * Math.pow(Math.abs(s), 1.3);
          targetFocus = ((N - 1) / 2) + eased * ((N - 1) / 2);
          targetFocus = Math.max(0, Math.min(N - 1, targetFocus));
        }

        setStatus(N === 0 ? 'Tracking · no notes' : 'Tracking', 'ok');
      } else {
        setStatus(N === 0 ? 'Looking · no notes' : 'Looking for hand', 'idle');
      }

      // Smooth focus toward target.
      focus += (targetFocus - focus) * 0.18;
      applyCardTransforms();

      requestAnimationFrame(loop);
    }

    // ---------- Boot ----------
    startBtn.addEventListener('click', async () => {
      intro.classList.add('loading');
      startBtn.textContent = 'Loading…';
      setStatus('Loading models', 'idle');
      try {
        await Promise.all([loadModels(), startCamera()]);
        intro.classList.add('hidden');
        running = true;
        setStatus(N === 0 ? 'No notes' : 'Looking for hand', 'idle');
        loop();
      } catch (err) {
        console.error(err);
        intro.classList.remove('loading');
        startBtn.textContent = 'Try again';
        const msg =
          err && err.name === 'NotAllowedError'
            ? 'Camera permission denied. Enable camera access and try again.'
            : err && err.name === 'NotFoundError'
            ? 'No camera found on this device.'
            : err && err.message
            ? err.message
            : 'Failed to start. Check your connection and try again.';
        showToast(msg);
      }
    });

    // Keyboard fallback for desktop debugging — also handy if a hand isn't
    // available, the user can still navigate with arrow keys.
    window.addEventListener('keydown', (e) => {
      if (N === 0) return;
      if (e.key === 'ArrowRight') targetFocus = Math.min(N - 1, Math.round(targetFocus) + 1);
      else if (e.key === 'ArrowLeft') targetFocus = Math.max(0, Math.round(targetFocus) - 1);
    });

    // Pause when tab hidden.
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) running = false;
      else if (handLandmarker && video.srcObject) { running = true; loop(); }
    });
  </script>
</body>
</html>
