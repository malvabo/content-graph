<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clade — Voice</title>
  <link rel="stylesheet" href="voice.css">
</head>
<body>
  <div id="app">
    <div id="orb-area">
      <div id="orb">
        <canvas id="orb-canvas" width="400" height="400"></canvas>
      </div>
      <div id="status">Tap to start listening...</div>
    </div>
    <div id="transcript-area" class="hidden">
      <div id="transcript"></div>
    </div>
    <div id="controls">
      <button id="btn-text" class="ctrl-btn">Show text</button>
      <button id="btn-end" class="ctrl-btn primary">End session</button>
    </div>
    <div id="voice-status">Voice on</div>
  </div>
  <script src="voice.js"></script>
</body>
</html>
