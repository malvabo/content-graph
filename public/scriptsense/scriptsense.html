function tokenize(text, insights = []) {
  // Sort phrases by first occurrence so earlier matches don't get skipped
  const sorted = [...insights].sort((a, b) =>
    text.toLowerCase().indexOf(a.phrase.toLowerCase()) - text.toLowerCase().indexOf(b.phrase.toLowerCase())
  );
  let cur = 0; const out = [];
  for (const ins of sorted) {
    const kw = ins.phrase;
    const i = text.toLowerCase().indexOf(kw.toLowerCase(), cur);
    if (i === -1) continue;
    if (i > cur) out.push({ text:text.slice(cur,i), type:"plain", key:null });
    out.push({ text:text.slice(i,i+kw.length), type:ins.type, key:kw });
    cur = i + kw.length;
  }
  if (cur < text.length) out.push({ text:text.slice(cur), type:"plain", key:null });
  return out;
}

function brandPromptPrefix() {
  const b = _brand;
  if (!b || !(b.name || b.voice?.personality || b.voice?.audience || b.voice?.avoidWords?.length)) return '';
  const parts = [];
  if (b.name) parts.push(`Brand: ${b.name}.`);
  if (b.voice?.personality) parts.push(`Voice personality: ${b.voice.personality}.`);
  if (b.voice?.audience) parts.push(`Audience: ${b.voice.audience}.`);
  if (b.voice?.avoidWords?.length) parts.push(`Words to avoid: ${b.voice.avoidWords.join(', ')}.`);
  return `Brand voice context (honor this in your analysis and any rephrasings):\n${parts.join(' ')}\n\n`;
}

async function callClaude(prompt) {
  function parseResponse(text) {
    const cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    return JSON.parse(cleaned);
  }

  const brandedPrompt = brandPromptPrefix() + prompt;

  if (_anthropicKey) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': _anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4096, messages: [{ role: 'user', content: brandedPrompt + '\n\nRespond with valid JSON only, no markdown.' }] }),
    });
    if (!res.ok) throw new Error('Anthropic API error: ' + res.status);
    const data = await res.json();
    const text = data.content?.[0]?.text ?? '';
    return parseResponse(text);
  }
  if (_groqKey) {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${_groqKey}` },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 4096, messages: [{ role: 'user', content: brandedPrompt + '\n\nRespond with valid JSON only, no markdown.' }] }),
    });
    if (!res.ok) throw new Error('Groq API error: ' + res.status);
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content ?? '';
    return parseResponse(text);
  }
  // No key — return mock as parsed object
  await new Promise(r => setTimeout(r, 600 + Math.random() * 400));
  return JSON.parse(MOCK_INSIGHTS);
}

      url: `https://scholar.google.com/scholar?q=${encodeURIComponent(query)}`,
      authors: null, year: null,
    },
    {

      url: `https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(query)}`,
      authors: null, year: null,
    },
  ] : [];
  return { sources, loading: false };
}

/* ─────────────────── Main App ─────────────────── */
function ContentGraphEditor({ draft, onSave, onBack }) {
  const brand = useBrand();
  const [text, setText]               = useState(() => {
    if (_pendingInitialText) { const v = _pendingInitialText; _pendingInitialText = null; return v; }
    try {
      const voice = localStorage.getItem('scriptsense-content');
      if (voice) { localStorage.removeItem('scriptsense-content'); return voice; }
    } catch {}
    return draft?.text ?? '';
  });
  useEffect(() => {
    const fn = t => { if (typeof t === 'string' && t.length) setText(t); };
    initialTextListeners.add(fn);
    return () => initialTextListeners.delete(fn);
  }, []);
  const [title, setTitle]             = useState(draft?.title || '');
  const [activeTab, setActiveTab]     = useState("insights");
  const [dismissed, setDismissed]     = useState(new Set());
  const [showDismissed, setShowDismissed] = useState(false);
  const [highlighted, setHighlighted] = useState(null);
  const [analysisVersion, setAnalysisVersion] = useState(0);
  const [aiInsights, setAiInsights]   = useState(null);
  const [insightLoading, setInsightLoading] = useState(false);
  const [insightError, setInsightError]   = useState(null);
  const [accepted, setAccepted]       = useState(new Set());
  const [staleInsights, setStaleInsights] = useState(false);
  const [undoStack, setUndoStack]     = useState([]);
  const analysisTextRef = useRef('');
  const taRef      = useRef(null);
  const overlayRef = useRef(null);
  const insightRef = useRef(null);
  const cardRefs    = useRef({});
  const autoSaveRef = useRef(null);
  const [saveStatus, setSaveStatus] = useState(null);

  /* ── Auto-save (debounced 1.2s, min 10 words) ── */
  useEffect(() => {
    const wc = text.split(/\s+/).filter(Boolean).length;
    if (wc < 10) return;
    setSaveStatus("saving");
    clearTimeout(autoSaveRef.current);
    autoSaveRef.current = setTimeout(() => {
      onSave({
        id: draft?.id ?? Date.now().toString(),
        title,
        text,
        wordCount: wc,
        createdAt: draft?.createdAt ?? Date.now(),
        updatedAt: Date.now(),
      });
      setSaveStatus("saved");
      setTimeout(() => setSaveStatus(null), 2000);
    }, 1200);
    return () => clearTimeout(autoSaveRef.current);
  }, [text, title]);

  /* ── Mark insights stale when text changes after analysis ── */
  useEffect(() => {
    if (analysisTextRef.current && text !== analysisTextRef.current) setStaleInsights(true);
  }, [text]);

  const paras = text.split("\n\n").filter(Boolean);

  /* ── AI insight analysis ── */
  useEffect(() => {
    if (analysisVersion === 0 || !text.trim()) return;
    setInsightLoading(true);
    setAiInsights(null);
    setInsightError(null);
    setDismissed(new Set());
    setAccepted(new Set());
    callClaude(
`You are a talk-script coach. Analyze the script below. Find up to 8 notable moments — science claims, metaphors/analogies, and logic gaps. Use simple, clear language (grade 11 level, no jargon).

Return ONLY valid JSON — no markdown, no explanation:
{
  "insights": [
    science/logic item:  { "phrase":"exact 2-8 word phrase from text", "type":"science"|"logic", "headline":"3-5 word title", "body":"1-2 sentences explaining the issue", "searchQuery":"search terms to find evidence", "rephrase":"improved replacement for just the flagged phrase — same meaning, more accurate or clearer" },
    metaphor item:       { "phrase":"exact phrase", "type":"metaphor", "headline":"short title", "original":"the phrase as used", "rephrase":"a stronger, clearer version of the metaphor phrase" }
  ]
}

Script:
${text}`
    ).then(data => {
      setAiInsights(data.insights || []);
      setInsightLoading(false);
      analysisTextRef.current = text;
      setStaleInsights(false);
    }).catch((err) => { setInsightError(err.message); setAiInsights([]); setInsightLoading(false); });
  }, [analysisVersion]);

  /* ── Trigger analysis with confirmation ── */
  const runAnalysis = useCallback(() => {
    if (!text.trim()) return;
    if (aiInsights && aiInsights.length > 0 && !window.confirm('Re-run will replace current insights. Continue?')) return;
    setAnalysisVersion(v => v + 1);
  }, [text, aiInsights]);

  /* ── Apply rephrase suggestion (with undo) ── */
  const handleApply = useCallback((phrase, rephrase) => {
    setUndoStack(s => [...s, { phrase, rephrase, originalText: text }]);
    setText(t => {
      const i = t.toLowerCase().indexOf(phrase.toLowerCase());
      if (i === -1) return t;
      return t.slice(0, i) + rephrase + t.slice(i + phrase.length);
    });
    setAccepted(a => new Set([...a, phrase]));
    setDismissed(d => new Set([...d, phrase]));
  }, [text]);

  const handleUndo = useCallback(() => {
    if (!undoStack.length) return;
    const last = undoStack[undoStack.length - 1];
    setText(last.originalText);
    setUndoStack(s => s.slice(0, -1));
    setAccepted(a => { const n = new Set(a); n.delete(last.phrase); return n; });
    setDismissed(d => { const n = new Set(d); n.delete(last.phrase); return n; });
  }, [undoStack]);

  const allInsights    = (aiInsights || []).map(ins => ({ kw: ins.phrase, data: ins }));
  const visibleInsights = showDismissed ? allInsights : allInsights.filter(({ kw }) => !dismissed.has(kw));

  const onScroll = useCallback(() => {
    if (!taRef.current) return;
    const el = taRef.current;
    if (overlayRef.current) overlayRef.current.scrollTop = el.scrollTop;
  }, []);

  /* ── Reverse linking: click card scrolls editor to phrase ── */
  const handleCardClick = useCallback((kw) => {
    const ta = taRef.current;
    if (!ta) return;
    const idx = ta.value.toLowerCase().indexOf(kw.toLowerCase());
    if (idx === -1) return;
    ta.focus();
    ta.setSelectionRange(idx, idx + kw.length);
    // Scroll textarea to show the phrase
    const lineH = 15 * 1.85;
    const charsBefore = ta.value.slice(0, idx);
    const linesBefore = charsBefore.split('\n').length - 1;
    ta.scrollTop = Math.max(0, linesBefore * lineH - 80);
    setHighlighted(kw);
    setTimeout(() => setHighlighted(null), 3000);
  }, []);

  const handleSpanClick = useCallback((kw, e) => {
    setActiveTab("insights");
    setHighlighted(kw);
    // Capture span's Y position before any state-driven re-render
    const spanTop = e.currentTarget.getBoundingClientRect().top;
    setTimeout(() => {
      const card = cardRefs.current[kw];
      const panel = insightRef.current;
      if (!card || !panel) return;
      const panelRect = panel.getBoundingClientRect();
      const cardRect  = card.getBoundingClientRect();
      // Scroll so card top lands at the same Y as the clicked span
      const desiredOffset  = spanTop - panelRect.top;
      const currentOffset  = cardRect.top - panelRect.top;
      panel.scrollTo({ top: panel.scrollTop + currentOffset - desiredOffset, behavior:"smooth" });
      setTimeout(() => setHighlighted(null), 3000);
    }, 40);
  }, []);

  const wc = text.split(/\s+/).filter(Boolean).length;

  const brandTag = brand && (brand.name || brand.voice?.personality)
    ? `Brand: ${brand.name || 'Unnamed'}${brand.voice?.personality ? ` · Tone: ${brand.voice.personality}` : ''}`
    : null;

  return (
    <>
      <style>{FONT_STYLE}</style>
      <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:C.pageBg, color:C.text }}>

        {brandTag && (
          <div aria-label="Brand voice active"
            style={{ padding:"6px 16px", fontSize:11, fontWeight:500, color:C.mute, background:C.surface, borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:C.accent, display:"inline-block" }} />
            {brandTag}
          </div>
        )}

        {/* ── Column labels + tabs ── */}
        <div style={{ display:"flex", background:C.white, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
          <div style={{ width:"50%", padding:"0 16px", display:"flex", alignItems:"center", gap:10, borderRight:`1px solid ${C.border}`, height:44 }}>
            <button onClick={onBack} className="back-btn" style={{ background:"none", border:"none", color:C.mute, display:"flex", padding:4, borderRadius:6 }}>
              <span style={{ fontSize:14 }}>←</span>
            </button>
            <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Untitled script"
              style={{ flex:1, fontSize:13, fontWeight:500, color:C.text, background:"none", border:"none", outline:"none", padding:"2px 0", borderBottom:"1px solid transparent", fontFamily:"inherit" }}
              onFocus={e => { e.currentTarget.style.borderBottomColor = C.border2; }}
              onBlur={e => { e.currentTarget.style.borderBottomColor = "transparent"; }} />
          </div>
          <div style={{ width:"50%", display:"flex", alignItems:"stretch" }}>
            {[["insights", analysisVersion > 0 ? `Insights · ${visibleInsights.length}` : "Insights"]].map(([tab,label]) => (
              <button key={tab} className="tab-btn" onClick={() => setActiveTab(tab)} style={{
                padding:"0 16px", fontSize:12, fontWeight:500, letterSpacing:"0.04em",
                color: activeTab===tab ? C.text : C.mute,
                borderBottom: activeTab===tab ? `2px solid ${C.accent}` : "2px solid transparent",
              }}>{label}</button>
            ))}
            <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8, paddingRight:16 }}>
              {saveStatus && (
                <span style={{ fontSize:11, color: saveStatus==="saved" ? C.accent : C.mute, fontWeight:500, transition:"color 0.2s" }}>
                  {saveStatus==="saving" ? "Saving…" : "✓ Saved"}
                </span>
              )}
              <div style={{ width:1, height:14, background:C.border }} />
              <button title="Re-run analysis" onClick={runAnalysis}
                style={{ width:36, height:36, borderRadius:8, border:"none", background:"transparent", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", transition:"background 100ms, color 100ms", color:C.mute }}
                onMouseEnter={e => { e.currentTarget.style.background = C.surface; e.currentTarget.style.color = C.text; }}
                onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = C.mute; }}>
                <RotateCcw size={16} color="currentColor" />
              </button>
              <div style={{ width:1, height:14, background:C.border }} />
            </div>
          </div>
        </div>

        {/* ── Split ── */}
        <div style={{ display:"flex", flex:1, minHeight:0 }}>

          {/* Left — editor */}
          <div style={{ width:"50%", borderRight:`1px solid ${C.border}`, position:"relative", display:"flex", flexDirection:"column", background:C.white }}>

            {/* highlight overlay */}
            <div ref={overlayRef} style={{ position:"absolute", inset:0, overflow:"hidden", padding:"28px 32px", pointerEvents:"none", fontSize:15, lineHeight:1.85, whiteSpace:"pre-wrap", wordBreak:"break-word", zIndex:1, color:"transparent", fontFamily:"-apple-system, BlinkMacSystemFont, system-ui, sans-serif", letterSpacing:"-0.01em" }}>
              {paras.map((p,pi) => (
                <p key={pi} style={{ marginBottom:28 }}>
                  {tokenize(p, aiInsights || []).map((s,i) =>
                    s.type==="plain"
                      ? <span key={i}>{s.text}</span>
                      : <span key={i} style={{ background: highlighted===s.key ? HL[s.type].activeBg : HL[s.type].bg, borderBottom:`2px solid ${HL[s.type].line}`, borderRadius:3, color:"transparent", boxShadow: highlighted===s.key ? `0 0 0 2px ${HL[s.type].line}` : "none", transition:"background 0.2s, box-shadow 0.2s" }}>{s.text}</span>
                  )}
                </p>
              ))}
            </div>

            {/* click layer */}
            <div style={{ position:"absolute", inset:0, overflow:"hidden", padding:"28px 32px", pointerEvents:"none", fontSize:15, lineHeight:1.85, whiteSpace:"pre-wrap", wordBreak:"break-word", zIndex:3, color:"transparent", fontFamily:"-apple-system, BlinkMacSystemFont, system-ui, sans-serif", letterSpacing:"-0.01em" }}>
              {paras.map((p,pi) => (
                <p key={pi} style={{ marginBottom:28 }}>
                  {tokenize(p, aiInsights || []).map((s,i) =>
                    s.type==="plain"
                      ? <span key={i}>{s.text}</span>
                      : <span key={i} className="hl-span" style={{ pointerEvents:"all", color:"transparent", background: highlighted===s.key ? HL[s.type].activeBg : "transparent", borderBottom:"2px solid transparent", borderRadius:3, boxShadow: highlighted===s.key ? `0 0 0 2px ${HL[s.type].line}` : "none", transition:"background 0.2s, box-shadow 0.2s" }} onClick={(e) => handleSpanClick(s.key, e)}>{s.text}</span>
                  )}
                </p>
              ))}
            </div>

            <textarea
              ref={taRef} value={text}
              onChange={e => setText(e.target.value)}
              onScroll={onScroll}
              placeholder="Paste or write your talk script here…"
              style={{ flex:1, outline:"none", border:"none", background:"transparent", padding:"28px 32px", fontSize:15, lineHeight:1.85, color:C.text, position:"relative", zIndex:2, letterSpacing:"-0.01em" }}
            />
          </div>

          {/* Right — insights panel */}
          <div ref={insightRef} className="scroll-area" style={{ width:"50%", overflowY:"auto", padding:"16px", display:"flex", flexDirection:"column", gap:12, background:C.surface }}>

            <div style={{ display: activeTab==="insights" ? "contents" : "none" }}>
              {/* ── Empty / loading / results states ── */}
              {analysisVersion === 0 && (
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flex:1, padding:40 }}>
                  <div style={{ maxWidth:260, textAlign:"center" }}>
                    <FileText size={20} color={C.mute} style={{ marginBottom:12 }} />
                    <p style={{ fontSize:14, fontWeight:500, color:C.text, marginBottom:4 }}>Analyze your script</p>
                    <p style={{ fontSize:13, color:C.mute, lineHeight:1.5, marginBottom:16 }}>Find science claims, metaphors, and logic gaps — then get suggestions to strengthen them.</p>
                    <button onClick={runAnalysis} style={{ height:32, padding:"0 14px", background:C.white, color:C.text, border:`1px solid ${C.border}`, borderRadius:10, fontSize:13, fontWeight:500, cursor:"pointer", transition:"background 100ms, border-color 100ms", letterSpacing:"-0.01em" }}
                      onMouseEnter={e => { e.currentTarget.style.background = C.surface; e.currentTarget.style.borderColor = C.border2; }}
                      onMouseLeave={e => { e.currentTarget.style.background = C.white; e.currentTarget.style.borderColor = C.border; }}>
                      Generate insights
                    </button>
                  </div>
                </div>
              )}
              {analysisVersion > 0 && insightLoading && (
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flex:1, gap:10, padding:40, color:C.mute }}>
                  <Loader size={18} style={{ animation:"spin 1s linear infinite" }} />
                  <p style={{ fontSize:13, fontWeight:500 }}>Analyzing your script…</p>
                  <p style={{ fontSize:12, color:C.mute, marginTop:4 }}>This usually takes 5–10 seconds</p>
                </div>
              )}
              {!insightLoading && aiInsights !== null && visibleInsights.length === 0 && (
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flex:1, gap:8, padding:40, color:C.mute, textAlign:"center" }}>
                  {insightError ? (
                    <>
                      <p style={{ fontSize:13, fontWeight:600, color:"#C93030" }}>API Error</p>
                      <p style={{ fontSize:12, color:"#C93030", maxWidth:300 }}>{insightError}</p>
                      <div style={{ marginTop:12, width:"100%", maxWidth:300 }}>
                        <p style={{ fontSize:11, fontWeight:600, color:C.sub, marginBottom:6, textAlign:"left" }}>Enter your Anthropic API key:</p>
                        <input
                          type="text"
                          placeholder="sk-ant-..."
                          defaultValue={window.__CLAUDE_KEY || ""}
                          onChange={e => { window.__CLAUDE_KEY = e.target.value.trim(); }}
                          style={{ width:"100%", padding:"8px 12px", border:`1px solid ${C.border}`, borderRadius:8, fontSize:13, outline:"none" }}
                        />
                        <button onClick={runAnalysis} style={{ marginTop:8, width:"100%", background:C.accent, color:C.white, border:"none", borderRadius:8, padding:"8px 0", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                          Retry
                        </button>
                      </div>
                    </>
                  ) : (
                    <>
                      <p style={{ fontSize:13, fontWeight:500 }}>No insights found</p>
                      <p style={{ fontSize:12, color:C.mute }}>Try adding more content to your script.</p>
                    </>
                  )}
                </div>
              )}
              {!insightLoading && visibleInsights.map(({ kw, data }) => (
                <div key={kw} style={{ animation:"fadeUp 0.2s ease" }}>
                  {data.type==="science"  && <ScienceCard  data={data} highlighted={highlighted===kw} elRef={el=>cardRefs.current[kw]=el} onClose={()=>setDismissed(d=>new Set([...d,kw]))} onApply={()=>handleApply(data.phrase, data.rephrase)} />}
                  {data.type==="metaphor" && <MetaphorCard data={data} highlighted={highlighted===kw} elRef={el=>cardRefs.current[kw]=el} onClose={()=>setDismissed(d=>new Set([...d,kw]))} onApply={()=>handleApply(data.phrase, data.rephrase)} />}
                  {data.type==="logic"    && <LogicCard    data={data} highlighted={highlighted===kw} elRef={el=>cardRefs.current[kw]=el} onClose={()=>setDismissed(d=>new Set([...d,kw]))} onApply={()=>handleApply(data.phrase, data.rephrase)} />}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── Status bar ── */}
        {(() => {
          const total = accepted.size + dismissed.size;
          const rate  = total > 0 ? Math.round(accepted.size / total * 100) : null;
          return (
            <div style={{ background:C.white, borderTop:`1px solid ${C.border}`, padding:"8px 24px", display:"flex", alignItems:"center", gap:10, fontSize:12, color:C.mute, fontWeight:500, flexShrink:0 }}>
              <span>{wc} words</span>
              <span style={{ opacity:0.3 }}>·</span>
              <span>{paras.length} paragraphs</span>
              <span style={{ opacity:0.3 }}>·</span>
              <span style={{ color: allInsights.filter(i=>i.data.type==="science").length > 0 ? TAG.science.text : C.mute }}>{allInsights.filter(i=>i.data.type==="science").length} science</span>
              <span style={{ opacity:0.3 }}>·</span>
              <span style={{ color: allInsights.filter(i=>i.data.type==="metaphor").length > 0 ? TAG.metaphor.text : C.mute }}>{allInsights.filter(i=>i.data.type==="metaphor").length} metaphors</span>
              <span style={{ opacity:0.3 }}>·</span>
              <span style={{ color: allInsights.filter(i=>i.data.type==="logic").length > 0 ? TAG.logic.text : C.mute }}>{allInsights.filter(i=>i.data.type==="logic").length} logic gaps</span>
              {rate !== null && <>
                <span style={{ opacity:0.3 }}>·</span>
                <span style={{ color: rate >= 60 ? TAG.metaphor.text : rate >= 30 ? TAG.logic.text : C.mute }}>
                  AI acceptance {rate}%
                </span>
              </>}
            </div>
          );
        })()}
      </div>
    </>
  );
}

/* ─────────────────── Router ─────────────────── */
function ContentGraph() {
  const [view, setView]           = useState("editor");
  const [currentDraft, setCurrentDraft] = useState(null);
  const [drafts, setDrafts]       = useState(() => {
    try { return JSON.parse(localStorage.getItem("ss_drafts") || "[]"); }
    catch { return []; }
  });

  const saveDraft = useCallback((d) => {
    setDrafts(prev => {
      const exists = prev.find(p => p.id === d.id);
      const next   = exists ? prev.map(p => p.id === d.id ? d : p) : [d, ...prev];
      localStorage.setItem("ss_drafts", JSON.stringify(next));
      return next;
    });
    setCurrentDraft(d);
  }, []);

  const deleteDraft = useCallback((id) => {
    setDrafts(prev => {
      const next = prev.filter(p => p.id !== id);
      localStorage.setItem("ss_drafts", JSON.stringify(next));
      return next;
    });
  }, []);

  if (false && view === "home") return (
    <HomePage
      drafts={drafts}
      onNew={() => { setCurrentDraft(null); setView("editor"); }}
      onOpen={(d) => { setCurrentDraft(d); setView("editor"); }}
      onDelete={deleteDraft}
    />
  );

  return (
    <ContentGraphEditor
      draft={currentDraft}
      onSave={saveDraft}
      onBack={() => setView("home")}
    />
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<ContentGraph />);

</script>
</body>
</html>
