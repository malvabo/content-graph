function tokenize(text, insights = []) {
  // Sort phrases by first occurrence so earlier matches don't get skipped
  const sorted = [...insights].sort((a, b) =>
    text.toLowerCase().indexOf(a.phrase.toLowerCase()) - text.toLowerCase().indexOf(b.phrase.toLowerCase())
  );
  let cur = 0; const out = [];
  for (const ins of sorted) {
    const kw = ins.phrase;
    const i = text.toLowerCase().indexOf(kw.toLowerCase(), cur);
    if (i === -1) continue;
    if (i > cur) out.push({ text:text.slice(cur,i), type:"plain", key:null });
    out.push({ text:text.slice(i,i+kw.length), type:ins.type, key:kw });
    cur = i + kw.length;
  }
  if (cur < text.length) out.push({ text:text.slice(cur), type:"plain", key:null });
  return out;
}

let _anthropicKey = '';
window.addEventListener('message', e => { if (e.data?.type === 'set-api-key') _anthropicKey = e.data.key; });

async function callClaude(prompt) {
  if (!_anthropicKey) {
    // Fallback to mock if no key
    await new Promise(r => setTimeout(r, 600 + Math.random() * 400));
    if (prompt.includes("audience engagement")) return MOCK_STORYTELLING;
    return MOCK_INSIGHTS;
  }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': _anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4096, messages: [{ role: 'user', content: prompt + '\n\nRespond with valid JSON only, no markdown.' }] }),
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  const data = await res.json();
  const text = data.content?.[0]?.text ?? '';
  try { return JSON.parse(text); } catch { return text; }
}

/* ── shared components ── */

function Tag({ type, label }) {
  const t = TAG[type] || TAG.logic;
  return (
    <span style={{
      display:"inline-flex", alignItems:"center",
      background:t.bg, color:t.text,
      borderRadius:8, fontSize:11, fontWeight:600,
      padding:"3px 10px", whiteSpace:"nowrap",
      letterSpacing:"0.01em",
    }}>{label}</span>
  );
}

function Label({ children }) {
  return <p style={{ fontSize:11, fontWeight:500, color:C.mute, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>{children}</p>;
}

function Divider() {
  return <div style={{ height:1, background:"rgba(0,0,0,0.06)", margin:"14px 0" }} />;
}

function Card({ children, elRef, highlighted }) {
  return (
    <div ref={elRef} className="card-inner" style={{
      background: C.white,
      borderRadius:12,
      padding:"20px",
      boxShadow: highlighted
        ? "0 0 0 2px #0DBF5A, 0 4px 16px rgba(13,191,90,0.12)"

      transition:"box-shadow 0.25s ease",
    }}>
      {children}
    </div>
  );
}

function CardHeader({ type, label, extra, onClose }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
        <Tag type={type} label={label} />

      </div>
      <button className="close-btn" onClick={onClose} style={{ flexShrink:0, marginLeft:8 }}>
        <X size={14} />
      </button>
    </div>
  );
}

function SourceList({ sources }) {
  if (!sources || sources.length === 0) return null;
  return (
    <>
      <Divider />
      <p style={{ fontSize:11, fontWeight:500, color:C.mute, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>Research</p>
      {sources.map((s,i) => (
        <a key={i} href={s.url} target="_blank" rel="noopener noreferrer" className="src-link"
          style={{ display:"flex", gap:9, marginBottom:8, alignItems:"flex-start" }}>
          <ExternalLink size={13} color={C.mute} style={{ marginTop:2, flexShrink:0 }} />
          <span className="src-title" style={{ fontSize:13, fontWeight:500, color:C.sub, lineHeight:1.4 }}>{s.title}</span>
        </a>
      ))}
    </>
  );
}

function useSources(query) {
  // Build real search links instead of asking AI to fabricate URLs
  const sources = query ? [
    {
      title: `Search Google Scholar: "${query}"`,
      url: `https://scholar.google.com/scholar?q=${encodeURIComponent(query)}`,
      authors: null, year: null,
    },
    {
      title: `Search PubMed: "${query}"`,
      url: `https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(query)}`,
      authors: null, year: null,
    },
  ] : [];
  return { sources, loading: false };
}

/* ── Rephrase block ── */
function RephraseBlock({ rephrase, onApply }) {
  if (!rephrase) return null;
  return (
    <div style={{ marginTop:14, background:C.accentLt, borderRadius:12, padding:"12px 14px" }}>
      <p style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", color:C.accentDark, marginBottom:6 }}>Rephrase to</p>
      <p style={{ fontSize:13, color:C.text, lineHeight:1.6, fontStyle:"italic", marginBottom:10 }}>"{rephrase}"</p>
      <button onClick={onApply} style={{
        background:C.accent, color:"#fff", border:"none", borderRadius:8,
        fontSize:12, fontWeight:600, padding:"5px 14px", cursor:"pointer",
      }}>Apply</button>
    </div>
  );
}

/* ── Science card ── */
function ScienceCard({ data, elRef, onClose, onApply, highlighted }) {
  const { sources } = useSources(data.searchQuery);
  return (
    <Card elRef={elRef} highlighted={highlighted}>
      <CardHeader type="science" label={data.warning ? "Debunked claim" : "Science claim"} onClose={onClose} />
      <p style={{ fontSize:15, fontWeight:600, color:C.text, lineHeight:1.4, marginBottom:8 }}>{data.headline}</p>
      <p style={{ fontSize:13, color:C.sub, lineHeight:1.7 }}>{data.body}</p>
      <RephraseBlock rephrase={data.rephrase} onApply={onApply} />
      <SourceList sources={sources} />
    </Card>
  );
}

/* ── Metaphor card ── */
function MetaphorCard({ data, country, elRef, onClose, onApply, highlighted }) {
  const ci = COUNTRIES.find(c => c.code === country) || COUNTRIES[0];
  const localized = data.localizations?.[country] || data.localizations?.["US"] || "";
  return (
    <Card elRef={elRef} highlighted={highlighted}>
      <CardHeader type="metaphor" label="Metaphor" extra={`${ci.flag} ${ci.name}`} onClose={onClose} />
      <p style={{ fontSize:15, fontWeight:600, color:C.text, lineHeight:1.4, marginBottom:14 }}>{data.headline}</p>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 32px 1fr", gap:8, alignItems:"stretch" }}>
        <div style={{ background:C.surface, borderRadius:12, padding:"12px 14px" }}>
          <p style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", color:C.mute, marginBottom:6 }}>Original</p>

        </div>
        <div style={{ display:"flex", justifyContent:"center", alignItems:"center" }}>
          <ArrowRight size={14} color={C.mute} />
        </div>
        <div style={{ background:C.accentLt, borderRadius:12, padding:"12px 14px" }}>
          <p style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", color:C.accentDark, marginBottom:6 }}>Localized</p>

        </div>

    </Card>

}

/* ── Logic card ── */
function LogicCard({ data, elRef, onClose, onApply, highlighted }) {
  const { sources } = useSources(data.searchQuery || `${data.headline} research evidence`);
  return (
    <Card elRef={elRef} highlighted={highlighted}>
      <CardHeader type="logic" label="Logic gap" onClose={onClose} />
      <p style={{ fontSize:15, fontWeight:600, color:C.text, lineHeight:1.4, marginBottom:8 }}>{data.headline}</p>
      <p style={{ fontSize:13, color:C.sub, lineHeight:1.7 }}>{data.body}</p>
      {data.fix && <p style={{ fontSize:13, color:C.sub, lineHeight:1.7, marginTop:8, fontStyle:"italic" }}>{data.fix}</p>}
      <RephraseBlock rephrase={data.rephrase} onApply={onApply} />
      <SourceList sources={sources} />
    </Card>
  );
}

/* ── Storytelling Panel ── */
function StorytellingPanel({ text, triggerVersion }) {
  const [segments, setSegments]   = useState(null);
  const [summary,  setSummary]    = useState(null);
  const [loading,  setLoading]    = useState(false);
  const [hovered,  setHovered]    = useState(0);
  const [summaryOpen, setSummaryOpen] = useState(false);

  useEffect(() => {
    if (!text || triggerVersion === 0) return;
    setLoading(true); setSegments(null); setSummary(null);
    const paras = text.split("\n\n").filter(Boolean);
    callClaude(
      `Analyze each paragraph's audience engagement for a talk script. Use simple, clear language at a grade 11 reading level — no jargon. Return ONLY a JSON object: {
  "segments": [ /* one per paragraph in order */ {"score":0-100,"label":"3-5 word title","why":"1-2 sentences WHY this is flat or captivating"} ],
  "summary": {"overallScore":0-100,"topStrength":"one sentence","topWeakness":"one sentence","recommendation":"one concrete actionable suggestion"}
}
Score guide: 0-30=flat/predictable, 31-65=moderate, 66-100=emotionally captivating.
Paragraphs:
${paras.map((p,i)=>`[${i+1}] "${p}"`).join("\n\n")}`
    ).then(raw => {
      try {
        const d = JSON.parse(raw.replace(/```json|```/g,"").trim());
        setSegments(d.segments || []);
        setSummary(d.summary || null);
      } catch {
        setSegments(paras.map((_,i) => ({ score:50, label:`Paragraph ${i+1}`, why:"" })));
      }
      setLoading(false);
    }).catch(() => setLoading(false));
  }, [triggerVersion]);

  const engColor = (score) => {
    if (score == null || score < 30) return "#C8D4CC";
    if (score < 55) return "#B0D8BF";
    if (score < 72) return "#5CB87A";
    return "#0DBF5A";
  };
  const engStroke = (score) => 1.5 + (Math.max(0, score - 20) / 80) * 2.5;

  if (loading) return (
    <div style={{ background:C.white, borderRadius:12, padding:20, border:"1px solid "+C.border, display:"flex", alignItems:"center", gap:8, color:C.mute, fontSize:13 }}>
      <Loader size={13} style={{ animation:"spin 1s linear infinite" }} /> Analyzing engagement arc…
    </div>
  );

  if (triggerVersion === 0) return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:40, gap:8, color:C.mute, textAlign:"center" }}>
      <p style={{ fontSize:13, fontWeight:500, color:C.sub }}>Click "Generate insights" to run the engagement arc analysis.</p>
    </div>
  );

  if (!segments?.length) return null;

  const n = segments.length;
  const VW = 600, VH = 140, PX = 28, PY = 18;
  const toY = (s) => PY + (VH - 2*PY) * (1 - Math.max(0, Math.min(100, s ?? 50)) / 100);
  const toX = (i) => n <= 1 ? VW/2 : PX + (VW - 2*PX) * i / (n - 1);
  const pts = segments.map((seg, i) => ({ x:toX(i), y:toY(seg.score), score:seg.score }));

  const curvePath = pts.reduce((d, p, i) => {
    if (i === 0) return `M ${p.x} ${p.y}`;
    const mx = (pts[i-1].x + p.x) / 2;
    return d + ` C ${mx} ${pts[i-1].y}, ${mx} ${p.y}, ${p.x} ${p.y}`;
  }, "");
  const areaPath = curvePath + ` L ${pts[pts.length-1].x} ${VH} L ${pts[0].x} ${VH} Z`;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>

      {/* ── Summary card (collapsible) ── */}
      {summary && (
        <div style={{ background:C.white, borderRadius:12, border:"1px solid "+C.border, animation:"fadeUp 0.18s ease", overflow:"hidden" }}>
          <div onClick={() => setSummaryOpen(o => !o)} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:16, cursor:"pointer", userSelect:"none" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <Tag type="science" label="Overall analysis" />
              <div style={{ background:`${engColor(summary.overallScore)}22`, borderRadius:8, padding:"2px 8px" }}>
                <span style={{ fontSize:12, fontWeight:700, color:engColor(summary.overallScore) }}>{summary.overallScore}/100</span>
              </div>
            </div>
            <ChevronDown size={14} color={C.mute} style={{ transform: summaryOpen ? "rotate(180deg)" : "rotate(0deg)", transition:"transform 0.2s" }} />
          </div>
          {summaryOpen && (
            <div style={{ padding:"0 16px 16px", display:"flex", flexDirection:"column", gap:12 }}>
              {[["#0DBF5A","#0A5C2A","Strength",summary.topStrength],["#C93030","#C93030","Weakness",summary.topWeakness],[C.accent,C.accent,"Recommendation",summary.recommendation]].map(([bar,label,title,text]) => (
                <div key={title} style={{ display:"flex", gap:10 }}>
                  <div style={{ width:3, borderRadius:99, background:bar, flexShrink:0 }} />
                  <div>
                    <p style={{ fontSize:11, fontWeight:600, color:label, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:3 }}>{title}</p>
                    <p style={{ fontSize:13, color:C.sub, lineHeight:1.65 }}>{text}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── Chart card ── */}
      <div style={{ background:C.white, borderRadius:12, padding:20, border:"1px solid "+C.border }}>

        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <span style={{ fontSize:12, fontWeight:600, color:C.sub, textTransform:"uppercase", letterSpacing:"0.06em" }}>Engagement arc</span>
          <div style={{ display:"flex", gap:14, alignItems:"center" }}>
            {[["#C8D4CC","Flat"],["#5CB87A","Building"],["#0DBF5A","Captivating"]].map(([col, lbl]) => (
              <div key={lbl} style={{ display:"flex", alignItems:"center", gap:5 }}>
                <div style={{ width:18, height:3, background:col, borderRadius:99 }} />
                <span style={{ fontSize:10, color:C.mute, fontWeight:500 }}>{lbl}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Y-axis + Chart */}
        <div style={{ display:"flex", gap:8, alignItems:"stretch" }}>
          <div style={{ display:"flex", flexDirection:"column", justifyContent:"space-between", paddingBottom:24 }}>
            <span style={{ fontSize:9, color:C.mute, textTransform:"uppercase", letterSpacing:"0.06em" }}>High</span>
            <span style={{ fontSize:9, color:C.mute, textTransform:"uppercase", letterSpacing:"0.06em" }}>Low</span>
          </div>
          <div style={{ flex:1, position:"relative" }}>
            <svg viewBox={`0 0 ${VW} ${VH}`} width="100%" height="140" preserveAspectRatio="none" style={{ display:"block", overflow:"visible" }}>
              <defs>
                <linearGradient id="engArea" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#0DBF5A" stopOpacity="0.08" />
                  <stop offset="100%" stopColor="#0DBF5A" stopOpacity="0" />
                </linearGradient>
              </defs>
              {/* Grid lines */}
              {[25, 50, 75].map(lvl => (
                <line key={lvl} x1={PX} y1={toY(lvl)} x2={VW-PX} y2={toY(lvl)}
                  stroke="rgba(0,0,0,0.05)" strokeWidth="1" strokeDasharray="4 6" />
              ))}
              {/* Area fill */}
              <path d={areaPath} fill="url(#engArea)" />
              {/* Colored segments */}
              {pts.slice(0,-1).map((p, i) => {
                const next = pts[i+1];
                const avg  = (p.score + next.score) / 2;
                const mx   = (p.x + next.x) / 2;
                const isHov = hovered === i || hovered === i+1;
                return (
                  <path key={i}
                    d={`M ${p.x} ${p.y} C ${mx} ${p.y}, ${mx} ${next.y}, ${next.x} ${next.y}`}
                    fill="none" stroke={engColor(avg)}
                    strokeWidth={engStroke(avg) * (isHov ? 1.5 : 1)}
                    strokeLinecap="round"
                    style={{ transition:"stroke-width 0.15s" }}
                  />
                );
              })}
              {/* Hover zones */}
              {pts.map((p, i) => {
                const x0 = i === 0 ? 0 : (pts[i-1].x + p.x) / 2;
                const x1 = i === n-1 ? VW : (p.x + pts[i+1].x) / 2;
                return (
                  <rect key={i} x={x0} y={0} width={x1-x0} height={VH}
                    fill="transparent" style={{ cursor:"default" }}
                    onMouseEnter={() => setHovered(i)}
                  />
                );
              })}
            </svg>

            {/* CSS dots — true circles (SVG circles distort with preserveAspectRatio=none) */}
            {pts.map((p, i) => {
              const isHov = hovered === i;
              const col   = engColor(p.score);
              return (
                <div key={i} style={{
                  position:"absolute",
                  left:`${(p.x / VW) * 100}%`,
                  top:`${(p.y / VH) * 100}%`,
                  width: isHov ? 12 : 8, height: isHov ? 12 : 8,
                  borderRadius:"50%", background:col,
                  border:"2px solid white",
                  transform:"translate(-50%, -50%)",
                  boxShadow: isHov ? `0 0 0 4px ${col}33` : "none",
                  transition:"width 0.15s, height 0.15s, box-shadow 0.15s",
                  pointerEvents:"none",
                }} />
              );
            })}

            {/* Paragraph labels */}
            {pts.map((p, i) => (
              <div key={i} style={{
                position:"absolute",
                left:`${(p.x / VW) * 100}%`,
                top:"calc(100% + 8px)",
                transform:"translateX(-50%)",
                fontSize:10, whiteSpace:"nowrap",
                fontWeight: hovered===i ? 600 : 400,
                color: hovered===i ? engColor(segments[i].score) : C.mute,
                transition:"color 0.12s",
              }}>P{i+1}</div>
            ))}
          </div>
        </div>
        {/* ── Segment detail ── */}
        {segments[hovered] && (
          <div style={{ marginTop:28, borderTop:"1px solid rgba(0,0,0,0.05)", paddingTop:24 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:engColor(segments[hovered].score), flexShrink:0 }} />
              <span style={{ fontSize:13, fontWeight:600, color:C.text, flex:1 }}>{segments[hovered].label}</span>
              <div style={{ background:`${engColor(segments[hovered].score)}22`, borderRadius:6, padding:"2px 8px" }}>
                <span style={{ fontSize:11, fontWeight:600, color:engColor(segments[hovered].score) }}>P{hovered+1} · {segments[hovered].score}/100</span>
              </div>
            </div>
            <p style={{ fontSize:13, color:C.sub, lineHeight:1.65 }}>{segments[hovered].why}</p>
          </div>
        )}
      </div>

    </div>
  );
}

              display:"flex", alignItems:"center", gap:24,

              marginTop:"calc(35vh - 100px)",

                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <FileText size={14} color={C.mute} style={{ flexShrink:0 }} />
                  <span style={{ flex:1, fontSize:13, fontWeight:500, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{getTitle(draft.text)}</span>
                  <span style={{ fontSize:11, color:C.mute, whiteSpace:"nowrap", flexShrink:0 }}>{draft.wordCount}w</span>
                  <span style={{ fontSize:11, color:C.mute, whiteSpace:"nowrap", flexShrink:0 }}>{fmt(draft.updatedAt)}</span>
                  <button onClick={(e) => { e.stopPropagation(); onDelete(draft.id); }}
                    className="close-btn" style={{ flexShrink:0, opacity:0.4 }}
                    onMouseEnter={e => e.currentTarget.style.opacity = "1"}

                    <X size={12} />
                  </button>

              ))}

          )}
        </div>
      </div>
    </>
  );
}

/* ─────────────────── Main App ─────────────────── */
function ContentGraphEditor({ draft, onSave, onBack }) {
  const [text, setText]               = useState(() => {
    const voice = localStorage.getItem('scriptsense-content');
    if (voice) { localStorage.removeItem('scriptsense-content'); return voice; }
    return draft?.text ?? SAMPLE_TEXT;
  });
  const [country, setCountry]         = useState("US");
  const [ddOpen, setDdOpen]           = useState(false);
  const [activeTab, setActiveTab]     = useState("insights");
  const [dismissed, setDismissed]     = useState(new Set());
  const [highlighted, setHighlighted] = useState(null);
  const [analysisVersion, setAnalysisVersion] = useState(0);
  const [aiInsights, setAiInsights]   = useState(null);   // null = not yet run
  const [insightLoading, setInsightLoading] = useState(false);
  const [insightError, setInsightError]   = useState(null);
  const [accepted, setAccepted]       = useState(new Set()); // phrases user applied
  const taRef      = useRef(null);
  const overlayRef = useRef(null);
  const insightRef = useRef(null);
  const cardRefs    = useRef({});
  const autoSaveRef = useRef(null);
  const [saveStatus, setSaveStatus] = useState(null); // null | "saving" | "saved"

  /* ── Auto-save (debounced 1.2s) ── */
  useEffect(() => {
    if (!text.trim()) return;
    setSaveStatus("saving");
    clearTimeout(autoSaveRef.current);
    autoSaveRef.current = setTimeout(() => {
      onSave({
        id: draft?.id ?? Date.now().toString(),
        text,
        wordCount: text.split(/\s+/).filter(Boolean).length,
        createdAt: draft?.createdAt ?? Date.now(),
        updatedAt: Date.now(),
      });
      setSaveStatus("saved");
      setTimeout(() => setSaveStatus(null), 2000);
    }, 1200);
    return () => clearTimeout(autoSaveRef.current);
  }, [text]);

  const paras = text.split("\n\n").filter(Boolean);

  /* ── AI insight analysis ── */
  useEffect(() => {
    if (analysisVersion === 0 || !text.trim()) return;
    setInsightLoading(true);
    setAiInsights(null);
    setInsightError(null);
    setDismissed(new Set());
    setAccepted(new Set());
    callClaude(
`You are a talk-script coach. Analyze the script below. Find up to 8 notable moments — science claims, metaphors/analogies, and logic gaps. Use simple, clear language (grade 11 level, no jargon).

Return ONLY valid JSON — no markdown, no explanation:
{
  "insights": [
    science/logic item:  { "phrase":"exact 2-8 word phrase from text", "type":"science"|"logic", "headline":"3-5 word title", "body":"1-2 sentences explaining the issue", "searchQuery":"search terms to find evidence", "rephrase":"improved replacement for just the flagged phrase — same meaning, more accurate or clearer" },
    metaphor item:       { "phrase":"exact phrase", "type":"metaphor", "headline":"short title", "original":"the phrase as used", "rephrase":"a stronger, clearer version of the metaphor phrase", "localizations":{"US":"...","JP":"...","BR":"...","IN":"...","DE":"...","NG":"...","MX":"...","AU":"..."} }
  IMPORTANT: All localizations and rephrase suggestions must be written in English. Localizations should use a culturally equivalent metaphor or analogy — not a translation. All text stays in English.
  ]
}

Script:
${text}`
    ).then(raw => {
      try {
        const d = JSON.parse(raw.replace(/```json|```/g, "").trim());
        setAiInsights(d.insights || []);
      } catch { setAiInsights([]); }
      setInsightLoading(false);
    }).catch((err) => { setInsightError(err.message); setAiInsights([]); setInsightLoading(false); });
  }, [analysisVersion]);

  /* ── Trigger both tabs at once ── */
  const runAnalysis = useCallback(() => {
    if (!text.trim()) return;
    setAnalysisVersion(v => v + 1);
  }, [text]);

  /* ── Apply rephrase suggestion ── */
  const handleApply = useCallback((phrase, rephrase) => {
    setText(t => {
      const i = t.toLowerCase().indexOf(phrase.toLowerCase());
      if (i === -1) return t;
      return t.slice(0, i) + rephrase + t.slice(i + phrase.length);
    });
    setAccepted(a => new Set([...a, phrase]));
    setDismissed(d => new Set([...d, phrase]));
  }, []);

  const allInsights    = (aiInsights || []).map(ins => ({ kw: ins.phrase, data: ins }));
  const visibleInsights = allInsights.filter(({ kw }) => !dismissed.has(kw));

  const onScroll = useCallback(() => {
    if (!taRef.current) return;
    const el = taRef.current;
    if (overlayRef.current) overlayRef.current.scrollTop = el.scrollTop;
  }, []);

  const handleSpanClick = useCallback((kw, e) => {
    setActiveTab("insights");
    setHighlighted(kw);
    // Capture span's Y position before any state-driven re-render
    const spanTop = e.currentTarget.getBoundingClientRect().top;
    setTimeout(() => {
      const card = cardRefs.current[kw];
      const panel = insightRef.current;
      if (!card || !panel) return;
      const panelRect = panel.getBoundingClientRect();
      const cardRect  = card.getBoundingClientRect();
      // Scroll so card top lands at the same Y as the clicked span
      const desiredOffset  = spanTop - panelRect.top;
      const currentOffset  = cardRect.top - panelRect.top;
      panel.scrollTo({ top: panel.scrollTop + currentOffset - desiredOffset, behavior:"smooth" });
      setTimeout(() => setHighlighted(null), 3000);
    }, 40);
  }, []);

  const selC = COUNTRIES.find(c => c.code === country);
  const wc   = text.split(/\s+/).filter(Boolean).length;

  return (
    <>
      <style>{FONT_STYLE}</style>
      <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:C.pageBg, color:C.text }}>


        {/* ── Column labels + tabs ── */}
        <div style={{ display:"flex", background:C.white, borderBottom:`1px solid rgba(0,0,0,0.06)`, flexShrink:0 }}>
          <div style={{ width:"50%", padding:"0 16px", display:"flex", alignItems:"center", gap:10, borderRight:`1px solid rgba(0,0,0,0.06)`, height:36 }}>
            <button className="back-btn" onClick={onBack} style={{ background:"none", border:"none", padding:"2px 4px", fontSize:11, fontWeight:600, color:C.mute, display:"flex", alignItems:"center", gap:4, letterSpacing:"0.04em" }}>
              <span style={{ fontSize:14, lineHeight:1 }}>←</span> Scripts
            </button>
            <div style={{ width:1, height:12, background:"rgba(0,0,0,0.08)" }} />
            <span style={{ fontSize:11, fontWeight:600, color:C.mute, letterSpacing:"0.06em", textTransform:"uppercase" }}>Script</span>
          </div>
          <div style={{ width:"50%", display:"flex", alignItems:"stretch" }}>
            {[["insights",`Insights · ${visibleInsights.length}`],["storytelling","Storytelling"]].map(([tab,label]) => (
              <button key={tab} className="tab-btn" onClick={() => setActiveTab(tab)} style={{
                padding:"0 18px", fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.06em",
                color: activeTab===tab ? C.accent : C.mute,
                borderBottom: activeTab===tab ? `2px solid ${C.accent}` : "2px solid transparent",
              }}>{label}</button>
            ))}
            <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8, paddingRight:16 }}>
              {saveStatus && (
                <span style={{ fontSize:11, color: saveStatus==="saved" ? "#1A5048" : C.mute, fontWeight:500, transition:"color 0.2s" }}>
                  {saveStatus==="saving" ? "Saving…" : "✓ Saved"}
                </span>
              )}
              <div style={{ width:1, height:14, background:"rgba(0,0,0,0.08)" }} />
              <button title="Re-run analysis" onClick={runAnalysis}
                style={{ width:26, height:26, borderRadius:"50%", border:`1px solid rgba(0,0,0,0.08)`, background:"transparent", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                <RotateCcw size={11} color={C.sub} />
              </button>
              <div style={{ width:1, height:14, background:"rgba(0,0,0,0.08)" }} />
              <div style={{ position:"relative" }}>
                <button className="dd-btn" onClick={() => setDdOpen(v=>!v)}
                  style={{ display:"flex", alignItems:"center", gap:5, background:"transparent", border:"none", color:C.text, fontSize:12, fontWeight:500, cursor:"pointer" }}>
                  <span>{selC?.flag}</span><span>{selC?.name}</span><ChevronDown size={10} color={C.mute} style={{ marginLeft:1 }} />
                </button>
                {ddOpen && (
                  <div style={{ position:"absolute", top:"calc(100% + 6px)", right:0, background:C.white, border:`1px solid rgba(0,0,0,0.07)`, borderRadius:14, boxShadow:"0 8px 24px rgba(0,0,0,0.10)", zIndex:99, minWidth:180, padding:"6px 0", overflow:"hidden" }}>
                    {COUNTRIES.map(c => (
                      <button key={c.code} className="dd-item"
                        onClick={() => { setCountry(c.code); setDdOpen(false); }}
                        style={{ width:"100%", textAlign:"left", padding:"8px 14px", background: country===c.code ? "#EEF8F2" : "transparent", color: country===c.code ? C.accent : C.text, fontSize:13, display:"flex", gap:8, alignItems:"center", border:"none", fontWeight: country===c.code ? 600 : 400 }}>
                        <span>{c.flag}</span><span>{c.name}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>

        {/* ── Split ── */}
        <div style={{ display:"flex", flex:1, minHeight:0 }}>

          {/* Left — editor */}
          <div style={{ width:"50%", borderRight:`1px solid rgba(0,0,0,0.06)`, position:"relative", display:"flex", flexDirection:"column", background:C.white }}>

            {/* highlight overlay */}
            <div ref={overlayRef} style={{ position:"absolute", inset:0, overflow:"hidden", padding:"28px 32px", pointerEvents:"none", fontSize:15, lineHeight:1.85, whiteSpace:"pre-wrap", wordBreak:"break-word", zIndex:1, color:"transparent", fontFamily:"Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif", letterSpacing:"-0.01em" }}>
              {paras.map((p,pi) => (
                <p key={pi} style={{ marginBottom:28 }}>
                  {tokenize(p, aiInsights || []).map((s,i) =>
                    s.type==="plain"
                      ? <span key={i}>{s.text}</span>
                      : <span key={i} style={{ background: highlighted===s.key ? HL[s.type].activeBg : HL[s.type].bg, borderBottom:`2px solid ${HL[s.type].line}`, borderRadius:3, color:"transparent", boxShadow: highlighted===s.key ? `0 0 0 2px ${HL[s.type].line}` : "none", transition:"background 0.2s, box-shadow 0.2s" }}>{s.text}</span>
                  )}
                </p>
              ))}
            </div>

            {/* click layer */}
            <div style={{ position:"absolute", inset:0, overflow:"hidden", padding:"28px 32px", pointerEvents:"none", fontSize:15, lineHeight:1.85, whiteSpace:"pre-wrap", wordBreak:"break-word", zIndex:3, color:"transparent", fontFamily:"Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif", letterSpacing:"-0.01em" }}>
              {paras.map((p,pi) => (
                <p key={pi} style={{ marginBottom:28 }}>
                  {tokenize(p, aiInsights || []).map((s,i) =>
                    s.type==="plain"
                      ? <span key={i}>{s.text}</span>
                      : <span key={i} className="hl-span" style={{ pointerEvents:"all", color:"transparent", background: highlighted===s.key ? HL[s.type].activeBg : "transparent", borderBottom:"2px solid transparent", borderRadius:3, boxShadow: highlighted===s.key ? `0 0 0 2px ${HL[s.type].line}` : "none", transition:"background 0.2s, box-shadow 0.2s" }} onClick={(e) => handleSpanClick(s.key, e)}>{s.text}</span>
                  )}
                </p>
              ))}
            </div>

            <textarea
              ref={taRef} value={text}
              onChange={e => setText(e.target.value)}
              onScroll={onScroll}
              placeholder="Paste your script here…"
              style={{ flex:1, outline:"none", border:"none", background:"transparent", padding:"28px 32px", fontSize:15, lineHeight:1.85, color:C.text, position:"relative", zIndex:2, mixBlendMode:"multiply", letterSpacing:"-0.01em" }}
            />
          </div>

          {/* Right — insights panel */}
          <div ref={insightRef} className="scroll-area" style={{ width:"50%", overflowY:"auto", padding:"12px", display:"flex", flexDirection:"column", gap:8, background:C.surface }}>

            <div style={{ display: activeTab==="insights" ? "contents" : "none" }}>
              {/* ── Empty / loading / results states ── */}
              {analysisVersion === 0 && (
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flex:1, gap:16, padding:40, textAlign:"center" }}>
                  <div style={{ width:48, height:48, borderRadius:14, background:C.white, display:"flex", alignItems:"center", justifyContent:"center", border:"1px solid "+C.border, boxShadow:"0 2px 8px rgba(0,0,0,0.04)" }}>
                    <FileText size={22} color={C.accent} />
                  </div>
                  <div>
                    <p style={{ fontSize:15, fontWeight:600, color:C.text, marginBottom:6 }}>Analyze your script</p>
                    <p style={{ fontSize:13, color:C.sub, lineHeight:1.6, maxWidth:240, margin:"0 auto" }}>Find science claims, metaphors, and logic gaps — then get suggestions to strengthen them.</p>
                  </div>
                  <button onClick={runAnalysis} style={{ background:C.accent, color:"#fff", border:"none", borderRadius:10, padding:"10px 24px", fontSize:13, fontWeight:600, cursor:"pointer", boxShadow:`0 2px 8px rgba(13,191,90,0.25)` }}>
                    Generate insights
                  </button>
                </div>
              )}
              {analysisVersion > 0 && insightLoading && (
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flex:1, gap:10, padding:40, color:C.mute }}>
                  <Loader size={18} style={{ animation:"spin 1s linear infinite" }} />
                  <p style={{ fontSize:13, fontWeight:500 }}>Analyzing your script…</p>
                </div>
              )}
              {!insightLoading && aiInsights !== null && visibleInsights.length === 0 && (
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flex:1, gap:8, padding:40, color:C.mute, textAlign:"center" }}>
                  {insightError ? (
                    <>
                      <p style={{ fontSize:13, fontWeight:600, color:"#C93030" }}>API Error</p>
                      <p style={{ fontSize:12, color:"#C93030", maxWidth:300 }}>{insightError}</p>
                      <div style={{ marginTop:12, width:"100%", maxWidth:300 }}>
                        <p style={{ fontSize:11, fontWeight:600, color:C.sub, marginBottom:6, textAlign:"left" }}>Enter your Anthropic API key:</p>
                        <input
                          type="text"
                          placeholder="sk-ant-..."
                          defaultValue={window.__CLAUDE_KEY || ""}
                          onChange={e => { window.__CLAUDE_KEY = e.target.value.trim(); }}
                          style={{ width:"100%", padding:"8px 12px", border:"1px solid rgba(0,0,0,0.12)", borderRadius:8, fontSize:13, outline:"none" }}
                        />
                        <button onClick={runAnalysis} style={{ marginTop:8, width:"100%", background:C.accent, color:"#fff", border:"none", borderRadius:8, padding:"8px 0", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                          Retry
                        </button>
                      </div>
                    </>
                  ) : (
                    <>
                      <p style={{ fontSize:13, fontWeight:500 }}>No insights found</p>
                      <p style={{ fontSize:12, color:C.mute }}>Try adding more content to your script.</p>
                    </>
                  )}
                </div>
              )}
              {!insightLoading && visibleInsights.map(({ kw, data }) => (
                <div key={kw}>
                  {data.type==="science"  && <ScienceCard  data={data} highlighted={highlighted===kw} elRef={el=>cardRefs.current[kw]=el} onClose={()=>setDismissed(d=>new Set([...d,kw]))} onApply={()=>handleApply(data.phrase, data.rephrase)} />}
                  {data.type==="metaphor" && <MetaphorCard data={data} country={country} highlighted={highlighted===kw} elRef={el=>cardRefs.current[kw]=el} onClose={()=>setDismissed(d=>new Set([...d,kw]))} onApply={()=>handleApply(data.phrase, data.rephrase)} />}
                  {data.type==="logic"    && <LogicCard    data={data} highlighted={highlighted===kw} elRef={el=>cardRefs.current[kw]=el} onClose={()=>setDismissed(d=>new Set([...d,kw]))} onApply={()=>handleApply(data.phrase, data.rephrase)} />}
                </div>
              ))}
            </div>

            <div style={{ display: activeTab==="storytelling" ? "contents" : "none" }}>
              <StorytellingPanel text={text} triggerVersion={analysisVersion} />
            </div>
          </div>
        </div>

        {/* ── Status bar ── */}
        {(() => {
          const total = accepted.size + dismissed.size;
          const rate  = total > 0 ? Math.round(accepted.size / total * 100) : null;
          return (
            <div style={{ background:C.white, borderTop:`1px solid rgba(0,0,0,0.06)`, padding:"5px 24px", display:"flex", alignItems:"center", gap:10, fontSize:12, color:C.mute, fontWeight:500, flexShrink:0 }}>
              <span>{wc} words</span>
              <span style={{ opacity:0.3 }}>·</span>
              <span>{paras.length} paragraphs</span>
              <span style={{ opacity:0.3 }}>·</span>
              <span style={{ color:"#0A5C2A" }}>{allInsights.filter(i=>i.data.type==="science").length} science</span>
              <span style={{ opacity:0.3 }}>·</span>
              <span style={{ color:"#1A5048" }}>{allInsights.filter(i=>i.data.type==="metaphor").length} metaphors</span>
              <span style={{ opacity:0.3 }}>·</span>
              <span style={{ color:"#6A4A10" }}>{allInsights.filter(i=>i.data.type==="logic").length} logic gaps</span>
              {rate !== null && <>
                <span style={{ opacity:0.3 }}>·</span>
                <span style={{ color: rate >= 60 ? "#1A5048" : rate >= 30 ? "#6A4A10" : C.mute }}>
                  AI acceptance {rate}%
                </span>
              </>}
              <span style={{ marginLeft:"auto", fontSize:11, color:C.mute }}>ContentGraph v0.1</span>
            </div>
          );
        })()}
      </div>
    </>
  );
}

/* ─────────────────── Router ─────────────────── */
function ContentGraph() {
  const [view, setView]           = useState("home");
  const [currentDraft, setCurrentDraft] = useState(null);
  const [drafts, setDrafts]       = useState(() => {
    try { return JSON.parse(localStorage.getItem("ss_drafts") || "[]"); }
    catch { return []; }
  });

  const saveDraft = useCallback((d) => {
    setDrafts(prev => {
      const exists = prev.find(p => p.id === d.id);
      const next   = exists ? prev.map(p => p.id === d.id ? d : p) : [d, ...prev];
      localStorage.setItem("ss_drafts", JSON.stringify(next));
      return next;
    });
    setCurrentDraft(d);
  }, []);

  const deleteDraft = useCallback((id) => {
    setDrafts(prev => {
      const next = prev.filter(p => p.id !== id);
      localStorage.setItem("ss_drafts", JSON.stringify(next));
      return next;
    });
  }, []);

  if (view === "home") return (
    <HomePage
      drafts={drafts}
      onNew={() => { setCurrentDraft(null); setView("editor"); }}
      onOpen={(d) => { setCurrentDraft(d); setView("editor"); }}
      onDelete={deleteDraft}
    />
  );

  return (
    <ContentGraphEditor
      draft={currentDraft}
      onSave={saveDraft}
      onBack={() => setView("home")}
    />
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<ContentGraph />);

</script>
</body>
</html>
