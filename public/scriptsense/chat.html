<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards</title>
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div id="app">
    <!-- Left: Story Cards -->
    <section id="story-panel">
      <div class="panel-header">
        <h1>Cards</h1>
        <span class="badge">4 cards</span>
      </div>
      <div id="story-cards"></div>
    </section>

    <!-- Right: Chat Panel -->
    <section id="chat-panel">
      <div class="panel-header">
        <h1>Chat</h1>
        <span class="model-badge">AI</span>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-bar">
        <div id="chat-input-row">
          <textarea id="chat-input" placeholder="Message AI..." rows="1"></textarea>
          <button id="send-btn" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div id="chat-input-meta">
          <span class="source-pill">Story Cards</span>
          <button id="btn-scriptsense" class="source-pill scriptsense-btn">Send to ScriptSense</button>
        </div>
      </div>
    </section>
  </div>
  <script src="https://unpkg.com/@rive-app/canvas@2.23.2"></script>
  <script src="chat.js"></script>
  <script>
    if(localStorage.getItem('dark-mode')==='true') document.documentElement.classList.add('dark');
    window.addEventListener('message',e=>{if(e.data?.type==='set-theme')document.documentElement.classList.toggle('dark',e.data.dark)});
  </script>
</body>
</html>
