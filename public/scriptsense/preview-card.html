<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ScienceCard preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
         -webkit-font-smoothing: antialiased; background: #f4f5f7;
         display: flex; align-items: center; justify-content: center;
         min-height: 100vh; padding: 40px; }
  .close-btn { background: none; border: none; cursor: pointer; color: #a0a0a8;
               display: flex; align-items: center; justify-content: center;
               border-radius: 6px; transition: background 120ms; }
  .close-btn:hover { background: #f0f0f0; }
  a { text-decoration: none; }
  a:hover .src-title { text-decoration: underline; }
</style>
</head>
<body>
<div id="root" style="width:100%;max-width:420px"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/lucide-react@0.469/dist/umd/lucide-react.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { X, ExternalLink } = LucideReact;

const C = {
  white:     "#ffffff",
  border:    "rgba(0,0,0,0.08)",
  text:      "#1a2420",
  sub:       "#4a5568",
  mute:      "#a0a0a8",
  accentLt:  "#f4f5f7",
  accentDark:"#2d3748",
  tagIndigo: { text:"#5b4fcf", bg:"rgba(91,79,207,0.08)" },
};

function Tag({ label }) {
  const t = C.tagIndigo;
  return (
    <span style={{ display:"inline-flex", alignItems:"center",
      background:t.bg, color:t.text,
      borderRadius:6, fontSize:11, fontWeight:600,
      padding:"3px 10px", whiteSpace:"nowrap", letterSpacing:"0.01em" }}>
      {label}
    </span>
  );
}

function Divider() {
  return <div style={{ height:1, background:C.border, margin:"14px 0" }} />;
}

function CardHeader({ label, onClose }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:0 }}>
      <Tag label={label} />
      <button className="close-btn" onClick={onClose} style={{ flexShrink:0, marginLeft:8, padding:6 }}>
        <X size={16} />
      </button>
    </div>
  );
}

function RephraseBlock({ rephrase }) {
  if (!rephrase) return null;
  return (
    <div style={{ marginTop:14, background:C.accentLt, borderRadius:12, padding:"12px 14px" }}>
      <p style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", color:C.accentDark, marginBottom:6 }}>Rephrase to</p>
      <p style={{ fontSize:13, color:C.text, lineHeight:1.6, marginBottom:10 }}>"{rephrase}"</p>
      <button style={{ background:"#0DBF5A", color:"#fff", border:"none", borderRadius:8,
        fontSize:12, fontWeight:600, padding:"6px 16px", cursor:"pointer" }}
        onMouseEnter={e => e.currentTarget.style.opacity="0.85"}
        onMouseLeave={e => e.currentTarget.style.opacity="1"}>Apply</button>
    </div>
  );
}

function SourceList({ sources }) {
  if (!sources || sources.length === 0) return null;
  return (
    <>
      <Divider />
      <p style={{ fontSize:11, fontWeight:500, color:C.mute, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>Research</p>
      {sources.map((s,i) => (
        <a key={i} href={s.url} target="_blank" rel="noopener noreferrer"
          style={{ display:"flex", gap:9, marginBottom:8, alignItems:"flex-start" }}>
          <ExternalLink size={13} color={C.mute} style={{ marginTop:2, flexShrink:0 }} />
          <span className="src-title" style={{ fontSize:13, fontWeight:500, color:C.sub, lineHeight:1.4 }}>{s.title}</span>
        </a>
      ))}
    </>
  );
}

function ScienceCard({ data }) {
  const query = data.searchQuery;
  const sources = query ? [
    { title:`Search Google Scholar: "${query}"`, url:`https://scholar.google.com/scholar?q=${encodeURIComponent(query)}` },
    { title:`Search PubMed: "${query}"`,         url:`https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(query)}` },
  ] : [];

  return (
    <div style={{ background:C.white, borderRadius:12, padding:20,
      boxShadow:`0 2px 8px ${C.border}, 0 0 0 1px rgba(0,0,0,0.06)` }}>
      <CardHeader label={data.warning ? "Debunked claim" : "Science claim"} onClose={() => {}} />
      <p style={{ fontSize:15, fontWeight:600, color:C.text, lineHeight:1.4, marginBottom:4, marginTop:8 }}>{data.headline}</p>
      <p style={{ fontSize:13, color:C.sub, lineHeight:1.7 }}>{data.body}</p>
      <RephraseBlock rephrase={data.rephrase} />
      <SourceList sources={sources} />
    </div>
  );
}

const SAMPLE = {
  type: "science",
  headline: "AI Learning Claims",
  body: "The claim that Gemini is 'constantly learning' needs clarification. Most deployed AI models don't continuously learn from user interactions in real-time.",
  searchQuery: "how AI models learn deployment vs training",
  rephrase: "AI assistant, Gemini, uses advanced training",
};

ReactDOM.createRoot(document.getElementById("root")).render(<ScienceCard data={SAMPLE} />);
</script>
</body>
</html>
