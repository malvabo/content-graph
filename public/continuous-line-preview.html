<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Continuous line — document → cards</title>
<style>
  :root {
    --bg: #1A1513;
    --ink: rgba(255, 255, 255, 0.92);
    --ink-soft: rgba(255, 255, 255, 0.55);
    --accent: #F29E4D;
  }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "SF Pro Text", sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    padding: 32px;
    box-sizing: border-box;
  }
  .stage {
    width: min(1100px, 100%);
    aspect-ratio: 16 / 7;
    background:
      radial-gradient(120% 80% at 50% 50%, rgba(242,158,77,0.06) 0%, transparent 55%),
      var(--bg);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    overflow: hidden;
    position: relative;
  }
  svg { width: 100%; height: 100%; display: block; }
  .caption {
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  /* ── continuous line draw ────────────────────────────────────── */
  /* dasharray length is set explicitly to match the path */
  .stroke {
    stroke: var(--ink);
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .soft { stroke: var(--ink-soft); }
  .accent { stroke: var(--accent); }

  /* Master path that draws across, holds, then erases back */
  /* Base outline — always visible */
  .flow-base {
    stroke: rgba(255, 255, 255, 0.28);
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Bright tracer that draws across, holds, then retraces */
  .flow {
    stroke: var(--accent);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 2400;
    stroke-dashoffset: 2400;
    animation: draw 6s cubic-bezier(.65,.05,.36,1) infinite;
    filter: drop-shadow(0 0 6px rgba(242,158,77,0.55));
  }
  @keyframes draw {
    0%   { stroke-dashoffset: 2400; }
    35%  { stroke-dashoffset: 0; }
    70%  { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -2400; }
  }

  /* Document — gentle hover */
  .doc { animation: doc-hover 6s ease-in-out infinite; transform-origin: 170px 220px; }
  @keyframes doc-hover {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  /* Cards — each card drifts on its own loop */
  .card { transform-origin: center; }
  .card-1 { animation: float-a 7s ease-in-out infinite; }
  .card-2 { animation: float-b 8s ease-in-out infinite; }
  .card-3 { animation: float-c 6.5s ease-in-out infinite; }
  .card-4 { animation: float-d 9s ease-in-out infinite; }

  @keyframes float-a {
    0%, 100% { transform: translate(0, 0) rotate(-4deg); }
    50%      { transform: translate(-10px, -8px) rotate(-1deg); }
  }
  @keyframes float-b {
    0%, 100% { transform: translate(0, 0) rotate(6deg); }
    50%      { transform: translate(8px, -12px) rotate(3deg); }
  }
  @keyframes float-c {
    0%, 100% { transform: translate(0, 0) rotate(-2deg); }
    50%      { transform: translate(-6px, 10px) rotate(-6deg); }
  }
  @keyframes float-d {
    0%, 100% { transform: translate(0, 0) rotate(3deg); }
    50%      { transform: translate(10px, 6px) rotate(7deg); }
  }

  /* Sparks at the leading edge of the drawn line */
  .spark {
    fill: #fff;
    opacity: 0;
    animation: spark-pulse 6s ease-in-out infinite;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.9));
  }
  @keyframes spark-pulse {
    0%, 2%   { opacity: 0; }
    5%, 35%  { opacity: 1; }
    36%, 100%{ opacity: 0; }
  }
</style>
</head>
<body>
  <div class="stage" aria-label="A document on the left feeds a continuously drawn line into a constellation of floating cards on the right.">
    <svg viewBox="0 0 1100 480" preserveAspectRatio="xMidYMid meet" role="img">
      <!-- ─── Document (left) ─────────────────────────────────── -->
      <g class="doc">
        <!-- Page outline with a folded corner -->
        <path class="stroke"
              stroke-width="1.5"
              d="M 110 140
                 L 210 140
                 L 240 168
                 L 240 304
                 Q 240 312 232 312
                 L 110 312
                 Q 102 312 102 304
                 L 102 148
                 Q 102 140 110 140 Z" />
        <!-- Folded corner crease -->
        <path class="stroke soft" stroke-width="1"
              d="M 210 140 L 210 168 L 240 168" />
        <!-- Text lines, scribbled in one continuous wavy stroke -->
        <path class="stroke soft" stroke-width="1.25"
              d="M 118 198 q 14 -6 28 0 t 28 0 t 28 0 t 28 0" />
        <path class="stroke soft" stroke-width="1.25"
              d="M 118 220 q 14 -6 28 0 t 28 0 t 28 0 t 28 0" />
        <path class="stroke soft" stroke-width="1.25"
              d="M 118 242 q 14 -6 28 0 t 28 0 t 28 0" />
        <path class="stroke soft" stroke-width="1.25"
              d="M 118 264 q 14 -6 28 0 t 28 0 t 28 0 t 28 0" />
        <path class="stroke soft" stroke-width="1.25"
              d="M 118 286 q 14 -6 28 0 t 28 0" />
      </g>

      <!-- ─── Continuous Flow Line ────────────────────────────── -->
      <!--
        One single, organic path from the document edge to the card
        cluster. Sweeps up, dips, loops, then resolves into the
        receiving area on the right. Drawn twice: a faint always-on
        base outline plus a bright orange tracer that animates.
      -->
      <path class="flow-base"
            d="M 240 226
               C 320 226, 360 140, 440 160
               S 520 320, 600 260
               S 700 140, 800 200
               S 900 320, 980 230
               S 1040 170, 990 150
               S 900 200, 920 260
               S 1000 320, 980 280" />
      <path id="flowPath"
            class="flow"
            d="M 240 226
               C 320 226, 360 140, 440 160
               S 520 320, 600 260
               S 700 140, 800 200
               S 900 320, 980 230
               S 1040 170, 990 150
               S 900 200, 920 260
               S 1000 320, 980 280" />

      <!-- Spark dot that rides at the end of the drawing -->
      <circle class="spark" r="4">
        <animateMotion dur="6s" repeatCount="indefinite"
                       keyTimes="0; 0.35; 1"
                       keyPoints="0; 1; 1"
                       calcMode="linear"
                       rotate="auto">
          <mpath href="#flowPath" />
        </animateMotion>
      </circle>

      <!-- ─── Cards constellation (right) ─────────────────────── -->
      <!-- Card 1: LinkedIn-ish — slightly tilted, top-right -->
      <g class="card card-1" transform="translate(820 110)">
        <path class="stroke" stroke-width="1.4"
              d="M 0 10 Q 0 0, 10 0 L 120 0 Q 130 0, 130 10 L 130 80 Q 130 90, 120 90 L 10 90 Q 0 90, 0 80 Z" />
        <circle class="stroke soft" stroke-width="1" cx="20" cy="22" r="6" />
        <path class="stroke soft" stroke-width="1" d="M 34 19 q 12 -4 24 0 t 24 0" />
        <path class="stroke soft" stroke-width="1" d="M 34 27 q 8 -3 16 0 t 16 0" />
        <path class="stroke soft" stroke-width="1" d="M 14 50 q 18 -5 36 0 t 36 0 t 30 0" />
        <path class="stroke soft" stroke-width="1" d="M 14 64 q 14 -4 28 0 t 28 0 t 28 0" />
        <path class="stroke soft" stroke-width="1" d="M 14 78 q 12 -4 24 0 t 24 0" />
      </g>

      <!-- Card 2: thread bubble — middle-right -->
      <g class="card card-2" transform="translate(900 220)">
        <path class="stroke" stroke-width="1.4"
              d="M 0 10 Q 0 0, 10 0 L 110 0 Q 120 0, 120 10 L 120 60 Q 120 70, 110 70 L 30 70 L 18 82 L 22 70 L 10 70 Q 0 70, 0 60 Z" />
        <path class="stroke soft" stroke-width="1" d="M 14 20 q 12 -4 24 0 t 24 0 t 24 0 t 24 0" />
        <path class="stroke soft" stroke-width="1" d="M 14 34 q 12 -4 24 0 t 24 0 t 24 0" />
        <path class="stroke soft" stroke-width="1" d="M 14 48 q 10 -3 20 0 t 20 0 t 20 0" />
      </g>

      <!-- Card 3: short note — bottom-right -->
      <g class="card card-3" transform="translate(770 290)">
        <path class="stroke" stroke-width="1.4"
              d="M 0 10 Q 0 0, 10 0 L 95 0 Q 105 0, 105 10 L 105 70 Q 105 80, 95 80 L 10 80 Q 0 80, 0 70 Z" />
        <path class="stroke soft" stroke-width="1" d="M 12 22 q 10 -3 20 0 t 20 0 t 20 0 t 20 0" />
        <path class="stroke soft" stroke-width="1" d="M 12 36 q 8 -3 16 0 t 16 0 t 16 0" />
        <path class="stroke soft" stroke-width="1" d="M 12 50 q 10 -3 20 0 t 20 0 t 20 0" />
        <path class="stroke soft" stroke-width="1" d="M 12 64 q 8 -3 16 0 t 16 0" />
      </g>

      <!-- Card 4: tall newsletter — far right, slightly behind -->
      <g class="card card-4" transform="translate(990 320)">
        <path class="stroke" stroke-width="1.4"
              d="M 0 10 Q 0 0, 10 0 L 80 0 Q 90 0, 90 10 L 90 90 Q 90 100, 80 100 L 10 100 Q 0 100, 0 90 Z" />
        <path class="stroke soft" stroke-width="1" d="M 12 18 l 66 0" />
        <path class="stroke soft" stroke-width="1" d="M 12 32 q 10 -3 20 0 t 20 0 t 20 0" />
        <path class="stroke soft" stroke-width="1" d="M 12 46 q 10 -3 20 0 t 20 0 t 20 0" />
        <path class="stroke soft" stroke-width="1" d="M 12 60 q 10 -3 20 0 t 20 0 t 20 0" />
        <path class="stroke soft" stroke-width="1" d="M 12 74 q 8 -3 16 0 t 16 0" />
        <path class="stroke soft" stroke-width="1" d="M 12 86 q 8 -3 16 0 t 16 0" />
      </g>
    </svg>
  </div>
  <div class="caption">Continuous line drawing — document → cards</div>
</body>
</html>
