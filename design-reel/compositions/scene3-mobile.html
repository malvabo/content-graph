<template id="scene3-mobile-template">
  <div
    data-composition-id="scene3-mobile"
    data-width="1920"
    data-height="1080"
    data-duration="8.4"
  >
    <!-- Phone mockup: portrait, straight-on, large -->
    <div id="phone-wrapper">
      <div class="phone-frame"></div>
      <div class="phone-screen">
        <video
          id="mob-screen"
          class="clip"
          src="../mob_onb.mov"
          data-start="0"
          data-duration="8.4"
          data-track-index="0"
          muted
          playsinline
          preload="auto"
        ></video>
      </div>
      <div class="dynamic-island"></div>
    </div>

    <style>
      [data-composition-id="scene3-mobile"] {
        background: #0a0a0f;
      }

      #phone-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 430px;
        height: 930px;
      }

      .phone-frame {
        position: absolute;
        inset: 0;
        background: linear-gradient(160deg, #2e2e32 0%, #1c1c1f 100%);
        border-radius: 50px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.08),
          0 80px 200px rgba(0, 0, 0, 0.95),
          0 0 120px rgba(90, 70, 200, 0.07);
      }

      .phone-screen {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        bottom: 12px;
        border-radius: 38px;
        overflow: hidden;
        background: #000;
      }

      #mob-screen {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .dynamic-island {
        position: absolute;
        top: 22px;
        left: calc(50% - 60px);
        width: 120px;
        height: 34px;
        background: #000;
        border-radius: 20px;
        z-index: 10;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });

        gsap.set("#phone-wrapper", { xPercent: -50, yPercent: -50, scale: 0.94, opacity: 0 });

        // Phone enters — full view
        tl.to("#phone-wrapper", { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.4)" }, 0.1);

        // Zoom in closer (screen fills more of frame)
        tl.to("#phone-wrapper", { scale: 1.22, duration: 1.3, ease: "power2.inOut" }, 3.5);

        // Pull back to full phone
        tl.to("#phone-wrapper", { scale: 1.0, duration: 1.1, ease: "power2.inOut" }, 6.0);

        // Fade out
        tl.to("#phone-wrapper", { opacity: 0, scale: 1.02, duration: 0.45, ease: "power2.in" }, 7.95);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene3-mobile"] = tl;
      })();
    </script>
  </div>
</template>
