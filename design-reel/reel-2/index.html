<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Mary Borysova — Portfolio Reel</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=block" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
        font-family: "Inter", sans-serif;
      }
      .scene {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="13"
      data-width="1920"
      data-height="1080"
    >
      <!-- Scene 1: Hospitality Is Changing — image stack + zoom -->
      <div
        id="scene-1"
        class="scene"
        data-composition-id="scene1-hospitality-intro"
        data-composition-src="compositions/scene1-hospitality-intro.html"
        data-start="0"
        data-duration="7"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 2: My Design Philosophy — title card -->
      <div
        id="scene-2"
        class="scene"
        data-composition-id="scene2-philosophy-title"
        data-composition-src="compositions/scene2-philosophy-title.html"
        data-start="7"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
